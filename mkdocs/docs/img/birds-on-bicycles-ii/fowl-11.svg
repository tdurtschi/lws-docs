<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Single-Speed Coot -->
  <defs>
    <style>
      .bird { fill: #1a1a1a; stroke: #000; stroke-width: 2; }
      .eye { fill: #ff0000; }
      .bike { stroke: #444; stroke-width: 2; fill: none; }
      .metal { fill: #555; stroke: #222; stroke-width: 1; }
    </style>
  </defs>

  <!-- Ground -->
  <rect y="250" width="400" height="50" fill="#5a6a6a"/>

  <!-- Back wheel -->
  <circle cx="300" cy="200" r="42" class="bike"/>
  <circle cx="300" cy="200" r="3" class="metal"/>

  <!-- Front wheel -->
  <circle cx="120" cy="200" r="42" class="bike"/>
  <circle cx="120" cy="200" r="3" class="metal"/>

  <!-- Clean single-speed frame -->
  <line x1="120" y1="140" x2="300" y2="200" class="bike" stroke-width="3"/>
  <line x1="120" y1="140" x2="80" y2="200" class="bike"/>
  <line x1="300" y1="200" x2="80" y2="200" class="bike"/>

  <!-- Straight handlebars -->
  <line x1="120" y1="140" x2="120" y2="110" class="bike"/>
  <line x1="105" y1="105" x2="135" y2="105" class="bike" stroke-width="2"/>

  <!-- Slim seat -->
  <ellipse cx="190" cy="130" rx="12" ry="8" class="metal"/>

  <!-- Coot body (round) -->
  <ellipse cx="190" cy="110" rx="33" ry="36" class="bird"/>

  <!-- Coot head -->
  <circle cx="205" cy="72" r="14" class="bird"/>

  <!-- Coot distinctive white mark on head -->
  <circle cx="207" cy="70" r="8" fill="#fff" opacity="0.6"/>

  <!-- Coot red eye -->
  <circle cx="212" cy="70" r="3" class="eye"/>

  <!-- Coot beak -->
  <polygon points="222,72 242,70 222,74" fill="#ff0"/>

  <!-- Single fixed gear -->
  <circle cx="170" cy="160" r="5" class="metal"/>
  <circle cx="230" cy="160" r="5" class="metal"/>
</svg>