<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="fatsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#D7CCC8"/>
    </linearGradient>
    <linearGradient id="snow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="265" fill="url(#fatsky)"/>
  <!-- Snow scene -->
  <rect y="245" width="400" height="55" fill="url(#snow)"/>
  <!-- Snow drifts -->
  <ellipse cx="80" cy="250" rx="80" ry="18" fill="white"/>
  <ellipse cx="320" cy="252" rx="90" ry="15" fill="white"/>
  <!-- Pine trees -->
  <g>
    <rect x="30" y="190" width="7" height="55" fill="#5D4037"/>
    <polygon points="33,192 8,240 58,240" fill="#2E7D32"/>
    <polygon points="33,175 12,220 54,220" fill="#388E3C"/>
    <polygon points="33,160 16,198 50,198" fill="#43A047"/>
  </g>
  <g>
    <rect x="355" y="195" width="7" height="50" fill="#5D4037"/>
    <polygon points="358,197 333,245 383,245" fill="#2E7D32"/>
    <polygon points="358,180 337,225 379,225" fill="#388E3C"/>
    <polygon points="358,165 341,203 375,203" fill="#43A047"/>
  </g>

  <!-- Fat Bike (HUGE tires) -->
  <!-- Rear wheel (super fat) -->
  <circle cx="135" cy="218" r="42" fill="none" stroke="#1A1A1A" stroke-width="18"/>
  <circle cx="135" cy="218" r="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Knobby tire pattern -->
  <g stroke="#555" stroke-width="3" opacity="0.5">
    <line x1="135" y1="176" x2="135" y2="260"/>
    <line x1="93" y1="218" x2="177" y2="218"/>
    <line x1="105" y1="188" x2="165" y2="248"/>
    <line x1="165" y1="188" x2="105" y2="248"/>
    <line x1="95" y1="203" x2="175" y2="233"/>
    <line x1="175" y1="203" x2="95" y2="233"/>
  </g>
  <circle cx="135" cy="218" r="8" fill="#1A1A1A"/>

  <!-- Front wheel (super fat) -->
  <circle cx="278" cy="218" r="42" fill="none" stroke="#1A1A1A" stroke-width="18"/>
  <circle cx="278" cy="218" r="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#555" stroke-width="3" opacity="0.5">
    <line x1="278" y1="176" x2="278" y2="260"/>
    <line x1="236" y1="218" x2="320" y2="218"/>
    <line x1="248" y1="188" x2="308" y2="248"/>
    <line x1="308" y1="188" x2="248" y2="248"/>
    <line x1="238" y1="203" x2="318" y2="233"/>
    <line x1="318" y1="203" x2="238" y2="233"/>
  </g>
  <circle cx="278" cy="218" r="8" fill="#1A1A1A"/>

  <!-- Fat bike frame -->
  <line x1="135" y1="218" x2="192" y2="155" stroke="#37474F" stroke-width="7"/>
  <line x1="192" y1="155" x2="278" y2="218" stroke="#37474F" stroke-width="7"/>
  <line x1="192" y1="155" x2="218" y2="153" stroke="#37474F" stroke-width="7"/>
  <line x1="218" y1="153" x2="135" y2="218" stroke="#37474F" stroke-width="5"/>

  <!-- Saddle -->
  <line x1="218" y1="153" x2="218" y2="133" stroke="#333" stroke-width="4"/>
  <ellipse cx="218" cy="131" rx="18" ry="7" fill="#212121"/>

  <!-- Handlebars (wide for fat bike) -->
  <line x1="192" y1="155" x2="192" y2="130" stroke="#333" stroke-width="5"/>
  <line x1="160" y1="125" x2="224" y2="125" stroke="#333" stroke-width="5"/>
  <circle cx="160" cy="125" r="5" fill="#111"/>
  <circle cx="224" cy="125" r="5" fill="#111"/>

  <!-- WOOD DUCK (spectacularly colorful) -->
  <!-- Body -->
  <ellipse cx="210" cy="113" rx="38" ry="22" fill="#8D6E63" transform="rotate(-8 210 113)"/>
  <!-- Iridescent bronze-green back -->
  <ellipse cx="200" cy="118" rx="32" ry="14" fill="#558B2F" transform="rotate(-5 200 118)"/>
  <!-- Burgundy-chestnut breast -->
  <ellipse cx="228" cy="108" rx="18" ry="18" fill="#4E1820" transform="rotate(15 228 108)"/>
  <!-- White flank stripe -->
  <path d="M226,120 Q240,124 252,120" stroke="white" stroke-width="4" fill="none"/>
  <!-- Tan flanks -->
  <ellipse cx="242" cy="118" rx="15" ry="10" fill="#BCAAA4" transform="rotate(-5 242 118)"/>
  <!-- Head (magnificent crest) -->
  <circle cx="255" cy="96" r="20" fill="#1B5E20"/>
  <!-- Iridescent purple-green head sheen -->
  <ellipse cx="250" cy="93" rx="14" ry="10" fill="#4A148C" opacity="0.6"/>
  <!-- White face stripes (very distinctive) -->
  <path d="M244,88 Q248,84 260,85" stroke="white" stroke-width="2.5" fill="none"/>
  <path d="M244,96 Q246,92 255,94" stroke="white" stroke-width="2" fill="none"/>
  <!-- Red eye ring -->
  <circle cx="263" cy="92" r="5" fill="#D32F2F"/>
  <circle cx="263" cy="92" r="3.5" fill="#1A1A1A"/>
  <circle cx="264" cy="91" r="1" fill="white"/>
  <!-- Bill (red/white/black) -->
  <path d="M272,96 L290,98 L272,102" fill="#D32F2F"/>
  <path d="M272,96 L280,96 L280,102 L272,102" fill="#1A1A1A"/>
  <!-- Flowing crest -->
  <path d="M248,80 Q238,68 232,60" stroke="#1B5E20" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M252,78 Q244,65 240,56" stroke="#4A148C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M258,77 Q252,64 250,55" stroke="#1B5E20" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tail (iridescent) -->
  <path d="M176,107 Q160,100 157,110 Q165,116 162,124 Q173,118 170,126" fill="#1B5E20"/>
  <!-- Feet -->
  <line x1="205" y1="132" x2="200" y2="155" stroke="#FFA000" stroke-width="3"/>
  <line x1="218" y1="133" x2="222" y2="156" stroke="#FFA000" stroke-width="3"/>
  <path d="M194,155 L206,155 L199,159" fill="#FFA000"/>
  <path d="M217,156 L229,156 L222,160" fill="#FFA000"/>

  <text x="8" y="292" font-family="Georgia,serif" font-size="13" fill="#1B5E20" font-style="italic">Wood Duck · Fat Bike</text>
</svg>
