<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tracksky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="265" fill="url(#tracksky)"/>
  <!-- Velodrome banked track curves -->
  <path d="M0,265 Q80,220 160,265" fill="none" stroke="#E91E63" stroke-width="4" opacity="0.3"/>
  <path d="M240,265 Q320,220 400,265" fill="none" stroke="#E91E63" stroke-width="4" opacity="0.3"/>
  <!-- Track markings -->
  <rect y="252" width="400" height="48" fill="#E0E0E0"/>
  <rect y="249" width="400" height="6" fill="#BDBDBD"/>
  <!-- Track stripe -->
  <rect y="255" width="400" height="4" fill="#E91E63" opacity="0.6"/>
  <rect y="262" width="400" height="4" fill="#1A237E" opacity="0.4"/>

  <!-- Track Bike (aggressive geometry, no brakes, fixed gear) -->
  <!-- Rear wheel (deep-section carbon look) -->
  <circle cx="132" cy="218" r="42" fill="none" stroke="#111" stroke-width="6"/>
  <!-- Carbon disc effect -->
  <circle cx="132" cy="218" r="38" fill="#1A237E" opacity="0.2"/>
  <circle cx="132" cy="218" r="34" fill="none" stroke="#333" stroke-width="1"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="132" y1="176" x2="132" y2="260"/>
    <line x1="90" y1="218" x2="174" y2="218"/>
    <line x1="103" y1="188" x2="161" y2="248"/>
    <line x1="161" y1="188" x2="103" y2="248"/>
    <line x1="92" y1="203" x2="172" y2="233"/>
    <line x1="172" y1="203" x2="92" y2="233"/>
    <line x1="117" y1="178" x2="147" y2="258"/>
    <line x1="147" y1="178" x2="117" y2="258"/>
  </g>
  <circle cx="132" cy="218" r="8" fill="#111"/>

  <!-- Front wheel (deep section) -->
  <circle cx="290" cy="218" r="42" fill="none" stroke="#111" stroke-width="6"/>
  <circle cx="290" cy="218" r="38" fill="#1A237E" opacity="0.2"/>
  <circle cx="290" cy="218" r="34" fill="none" stroke="#333" stroke-width="1"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="290" y1="176" x2="290" y2="260"/>
    <line x1="248" y1="218" x2="332" y2="218"/>
    <line x1="261" y1="188" x2="319" y2="248"/>
    <line x1="319" y1="188" x2="261" y2="248"/>
    <line x1="250" y1="203" x2="330" y2="233"/>
    <line x1="330" y1="203" x2="250" y2="233"/>
    <line x1="275" y1="178" x2="305" y2="258"/>
    <line x1="305" y1="178" x2="275" y2="258"/>
  </g>
  <circle cx="290" cy="218" r="8" fill="#111"/>

  <!-- Track frame (short wheelbase, very steep angles) -->
  <line x1="132" y1="218" x2="192" y2="148" stroke="#AD1457" stroke-width="6"/>
  <line x1="192" y1="148" x2="290" y2="218" stroke="#AD1457" stroke-width="6"/>
  <line x1="192" y1="148" x2="222" y2="146" stroke="#AD1457" stroke-width="6"/>
  <line x1="222" y1="146" x2="132" y2="218" stroke="#AD1457" stroke-width="5"/>

  <!-- No brakes! (track bikes have none) -->

  <!-- Saddle (minimal, forward) -->
  <line x1="222" y1="146" x2="230" y2="125" stroke="#333" stroke-width="4"/>
  <path d="M217,124 Q230,117 243,124" stroke="#111" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Track drops (pursuit/pista style) -->
  <line x1="192" y1="148" x2="198" y2="124" stroke="#333" stroke-width="4"/>
  <path d="M180,120 Q198,113 216,120 Q218,130 208,136 Q199,140 194,133" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="194" cy="133" r="4" fill="#111"/>
  <circle cx="180" cy="120" r="4" fill="#111"/>

  <!-- Crank -->
  <circle cx="192" cy="190" r="10" fill="#333"/>
  <line x1="182" y1="202" x2="202" y2="178" stroke="#555" stroke-width="4"/>
  <rect x="176" y="200" width="13" height="4" fill="#222" rx="1"/>

  <!-- ROSEATE SPOONBILL -->
  <!-- Body (deep pink) -->
  <ellipse cx="220" cy="107" rx="40" ry="22" fill="#E91E63" transform="rotate(-10 220 107)"/>
  <!-- Wings -->
  <ellipse cx="208" cy="114" rx="34" ry="14" fill="#C2185B" transform="rotate(-8 208 114)"/>
  <!-- Deeper pink shoulder patch -->
  <ellipse cx="234" cy="100" rx="18" ry="14" fill="#AD1457" transform="rotate(20 234 100)"/>
  <!-- Red wing shoulder carmine -->
  <path d="M230,100 Q240,95 250,100" stroke="#D32F2F" stroke-width="5" fill="none"/>
  <!-- Long neck (white/pale pink) -->
  <path d="M250,94 Q268,80 272,64" stroke="#FCE4EC" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- Bald greenish head -->
  <circle cx="272" cy="58" r="16" fill="#A5D6A7"/>
  <!-- Eye (red) -->
  <circle cx="281" cy="55" r="3.5" fill="#D32F2F"/>
  <circle cx="281" cy="55" r="2" fill="#1A1A1A"/>
  <!-- SPOON-SHAPED bill (the defining feature) -->
  <!-- Bill shaft -->
  <path d="M283,59 L318,64" stroke="#FFFDE7" stroke-width="5" stroke-linecap="round"/>
  <!-- Spoon end (flat spatula) -->
  <ellipse cx="325" cy="65" rx="12" ry="7" fill="#FFFDE7" transform="rotate(10 325 65)"/>
  <!-- Spoon pattern detail -->
  <ellipse cx="325" cy="65" rx="9" ry="5" fill="#FFF9C4" opacity="0.7" transform="rotate(10 325 65)"/>
  <!-- Tail (white) -->
  <path d="M183,98 Q167,91 164,100 Q172,107 169,115 Q179,108 177,116" fill="#FCE4EC"/>
  <!-- Long pink legs -->
  <line x1="215" y1="126" x2="210" y2="155" stroke="#E91E63" stroke-width="4"/>
  <line x1="230" y1="127" x2="235" y2="157" stroke="#E91E63" stroke-width="4"/>
  <path d="M204,155 L216,155 L209,159" fill="#E91E63"/>
  <path d="M230,157 L242,157 L235,161" fill="#E91E63"/>

  <text x="8" y="292" font-family="Georgia,serif" font-size="13" fill="#880E4F" font-style="italic">Roseate Spoonbill · Track Bike</text>
</svg>
