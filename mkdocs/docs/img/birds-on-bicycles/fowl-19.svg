<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ebikesky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="265" fill="url(#ebikesky)"/>
  <!-- Modern city scene -->
  <!-- Solar panels on distant building -->
  <rect x="330" y="140" width="60" height="50" fill="#78909C"/>
  <g fill="#455A64" stroke="#37474F" stroke-width="0.5">
    <rect x="333" y="143" width="25" height="20"/>
    <rect x="361" y="143" width="25" height="20"/>
    <rect x="333" y="166" width="25" height="20"/>
    <rect x="361" y="166" width="25" height="20"/>
  </g>
  <g fill="#1565C0" opacity="0.6">
    <rect x="334" y="144" width="23" height="18"/>
    <rect x="362" y="144" width="23" height="18"/>
    <rect x="334" y="167" width="23" height="18"/>
    <rect x="362" y="167" width="23" height="18"/>
  </g>
  <!-- Wind turbines distant -->
  <line x1="55" y1="210" x2="55" y2="100" stroke="#90A4AE" stroke-width="3"/>
  <line x1="55" y1="100" x2="35" y2="120" stroke="#90A4AE" stroke-width="2"/>
  <line x1="55" y1="100" x2="75" y2="120" stroke="#90A4AE" stroke-width="2"/>
  <line x1="55" y1="100" x2="55" y2="125" stroke="#90A4AE" stroke-width="2"/>
  <!-- Bike path -->
  <rect y="252" width="400" height="48" fill="#558B2F"/>
  <rect y="249" width="400" height="6" fill="#33691E"/>
  <!-- Bike path symbol -->
  <g fill="white" opacity="0.3">
    <circle cx="70" cy="270" r="8"/>
    <rect x="60" y="255" width="20" height="12" rx="2"/>
    <line x1="70" y1="268" x2="70" y2="280" stroke="white" stroke-width="2"/>
  </g>

  <!-- Electric Bike (with visible battery and motor) -->
  <!-- Rear wheel -->
  <circle cx="145" cy="220" r="42" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="145" cy="220" r="35" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="145" y1="178" x2="145" y2="262"/>
    <line x1="103" y1="220" x2="187" y2="220"/>
    <line x1="115" y1="190" x2="175" y2="250"/>
    <line x1="175" y1="190" x2="115" y2="250"/>
    <line x1="105" y1="205" x2="185" y2="235"/>
    <line x1="185" y1="205" x2="105" y2="235"/>
  </g>
  <!-- Motor hub (rear hub motor) -->
  <circle cx="145" cy="220" r="14" fill="#37474F" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="145" cy="220" r="9" fill="#546E7A"/>
  <!-- Motor glow -->
  <circle cx="145" cy="220" r="12" fill="none" stroke="#4CAF50" stroke-width="2" opacity="0.6"/>

  <!-- Front wheel -->
  <circle cx="290" cy="220" r="42" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="290" cy="220" r="35" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="290" y1="178" x2="290" y2="262"/>
    <line x1="248" y1="220" x2="332" y2="220"/>
    <line x1="260" y1="190" x2="320" y2="250"/>
    <line x1="320" y1="190" x2="260" y2="250"/>
    <line x1="250" y1="205" x2="330" y2="235"/>
    <line x1="330" y1="205" x2="250" y2="235"/>
  </g>
  <circle cx="290" cy="220" r="8" fill="#1A1A1A"/>

  <!-- E-Bike frame -->
  <line x1="145" y1="220" x2="200" y2="158" stroke="#263238" stroke-width="7"/>
  <line x1="200" y1="158" x2="290" y2="220" stroke="#263238" stroke-width="6"/>
  <line x1="200" y1="158" x2="228" y2="156" stroke="#263238" stroke-width="6"/>
  <line x1="228" y1="156" x2="145" y2="220" stroke="#263238" stroke-width="5"/>

  <!-- BATTERY PACK (integrated into downtube) -->
  <rect x="152" y="168" width="38" height="18" rx="6" fill="#4CAF50" stroke="#388E3C" stroke-width="2"/>
  <rect x="155" y="171" width="10" height="12" rx="2" fill="#2E7D32"/>
  <rect x="168" y="171" width="10" height="12" rx="2" fill="#2E7D32"/>
  <rect x="181" y="171" width="7" height="12" rx="2" fill="#66BB6A"/>
  <!-- Charge indicator -->
  <text x="180" y="181" font-size="8" fill="white" font-family="monospace">⚡</text>

  <!-- Display/computer on bars -->
  <rect x="193" y="128" width="22" height="16" rx="3" fill="#37474F" stroke="#263238" stroke-width="1.5"/>
  <rect x="195" y="130" width="18" height="12" rx="2" fill="#1A237E"/>
  <text x="197" y="140" font-size="7" fill="#64DD17" font-family="monospace">28</text>

  <!-- Saddle -->
  <line x1="228" y1="156" x2="228" y2="136" stroke="#333" stroke-width="4"/>
  <ellipse cx="228" cy="134" rx="18" ry="7" fill="#212121"/>

  <!-- Handlebars (upright e-bike) -->
  <line x1="200" y1="158" x2="200" y2="130" stroke="#333" stroke-width="5"/>
  <line x1="178" y1="126" x2="222" y2="126" stroke="#333" stroke-width="5"/>
  <circle cx="178" cy="126" r="5" fill="#111"/>
  <circle cx="222" cy="126" r="5" fill="#111"/>

  <!-- COMMON MOORHEN (Gallinule) -->
  <!-- Body (slate black) -->
  <ellipse cx="222" cy="116" rx="38" ry="21" fill="#212121" transform="rotate(-7 222 116)"/>
  <!-- White flank stripe -->
  <path d="M196,122 Q210,128 225,126" stroke="white" stroke-width="3" fill="none"/>
  <!-- White undertail patches -->
  <ellipse cx="194" cy="120" rx="10" ry="6" fill="white" opacity="0.9" transform="rotate(30 194 120)"/>
  <!-- Slate-blue belly -->
  <ellipse cx="225" cy="125" rx="24" ry="11" fill="#37474F" transform="rotate(-5 225 125)"/>
  <!-- Wing -->
  <ellipse cx="212" cy="122" rx="32" ry="12" fill="#263238" transform="rotate(-5 212 122)"/>
  <!-- Head -->
  <circle cx="258" cy="100" r="19" fill="#1A1A1A"/>
  <!-- Red frontal shield (very distinctive!) -->
  <path d="M248,90 Q258,84 268,90 Q272,96 268,102 Q258,106 248,102 Z" fill="#D32F2F"/>
  <!-- Yellow-tipped red bill -->
  <path d="M268,98 L290,100 L268,104" fill="#D32F2F"/>
  <path d="M282,99 L291,100 L282,103" fill="#FDD835"/>
  <!-- Eye (red) -->
  <circle cx="265" cy="97" r="3" fill="#D32F2F"/>
  <circle cx="265" cy="97" r="2" fill="#1A1A1A"/>
  <circle cx="266" cy="96" r="1" fill="white"/>
  <!-- Neck -->
  <path d="M246,108 Q250,114 248,122" stroke="#1A1A1A" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Tail (cocked up, white showing) -->
  <path d="M187,108 Q170,100 167,110 Q175,116 171,124 Q182,117 179,126" fill="#1A1A1A"/>
  <path d="M187,108 Q173,101 170,110" stroke="white" stroke-width="2" fill="none"/>
  <!-- Long green legs and feet -->
  <line x1="215" y1="134" x2="210" y2="162" stroke="#558B2F" stroke-width="4"/>
  <line x1="230" y1="135" x2="234" y2="163" stroke="#558B2F" stroke-width="4"/>
  <!-- Big splayed feet -->
  <line x1="210" y1="162" x2="197" y2="168" stroke="#558B2F" stroke-width="3"/>
  <line x1="210" y1="162" x2="213" y2="170" stroke="#558B2F" stroke-width="3"/>
  <line x1="210" y1="162" x2="223" y2="166" stroke="#558B2F" stroke-width="3"/>
  <line x1="234" y1="163" x2="222" y2="168" stroke="#558B2F" stroke-width="3"/>
  <line x1="234" y1="163" x2="236" y2="171" stroke="#558B2F" stroke-width="3"/>
  <line x1="234" y1="163" x2="247" y2="167" stroke="#558B2F" stroke-width="3"/>

  <text x="8" y="292" font-family="Georgia,serif" font-size="13" fill="#1B5E20" font-style="italic">Common Moorhen · Electric Bike</text>
</svg>
