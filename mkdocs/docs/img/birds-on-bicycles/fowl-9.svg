<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="trisky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="265" fill="url(#trisky)"/>
  <!-- Garden scene -->
  <ellipse cx="50" cy="255" rx="50" ry="12" fill="#A5D6A7"/>
  <ellipse cx="350" cy="255" rx="50" ry="12" fill="#A5D6A7"/>
  <!-- Flowers -->
  <circle cx="340" cy="240" r="6" fill="#FF8A65"/>
  <circle cx="355" cy="235" r="6" fill="#FF80AB"/>
  <circle cx="370" cy="243" r="6" fill="#FFCC02"/>
  <rect x="340" y="240" width="2" height="12" fill="#388E3C"/>
  <rect x="355" y="235" width="2" height="17" fill="#388E3C"/>
  <rect x="370" y="243" width="2" height="9" fill="#388E3C"/>
  <rect y="252" width="400" height="48" fill="#D7CCC8"/>
  <rect y="249" width="400" height="6" fill="#C4A882"/>

  <!-- Tricycle -->
  <!-- Two rear wheels -->
  <circle cx="100" cy="228" r="35" fill="none" stroke="#4A148C" stroke-width="6"/>
  <circle cx="100" cy="228" r="27" fill="none" stroke="#6A1B9A" stroke-width="1.5"/>
  <g stroke="#7B1FA2" stroke-width="1.5">
    <line x1="100" y1="193" x2="100" y2="263"/>
    <line x1="65" y1="228" x2="135" y2="228"/>
    <line x1="75" y1="203" x2="125" y2="253"/>
    <line x1="125" y1="203" x2="75" y2="253"/>
    <line x1="66" y1="215" x2="134" y2="241"/>
    <line x1="134" y1="215" x2="66" y2="241"/>
  </g>
  <circle cx="100" cy="228" r="7" fill="#4A148C"/>

  <circle cx="200" cy="228" r="35" fill="none" stroke="#4A148C" stroke-width="6"/>
  <circle cx="200" cy="228" r="27" fill="none" stroke="#6A1B9A" stroke-width="1.5"/>
  <g stroke="#7B1FA2" stroke-width="1.5">
    <line x1="200" y1="193" x2="200" y2="263"/>
    <line x1="165" y1="228" x2="235" y2="228"/>
    <line x1="175" y1="203" x2="225" y2="253"/>
    <line x1="225" y1="203" x2="175" y2="253"/>
    <line x1="166" y1="215" x2="234" y2="241"/>
    <line x1="234" y1="215" x2="166" y2="241"/>
  </g>
  <circle cx="200" cy="228" r="7" fill="#4A148C"/>

  <!-- Rear axle connecting two back wheels -->
  <line x1="100" y1="228" x2="200" y2="228" stroke="#4A148C" stroke-width="7"/>

  <!-- Single front wheel -->
  <circle cx="318" cy="222" r="38" fill="none" stroke="#4A148C" stroke-width="6"/>
  <circle cx="318" cy="222" r="30" fill="none" stroke="#6A1B9A" stroke-width="1.5"/>
  <g stroke="#7B1FA2" stroke-width="1.5">
    <line x1="318" y1="184" x2="318" y2="260"/>
    <line x1="280" y1="222" x2="356" y2="222"/>
    <line x1="291" y1="195" x2="345" y2="249"/>
    <line x1="345" y1="195" x2="291" y2="249"/>
    <line x1="282" y1="209" x2="354" y2="235"/>
    <line x1="354" y1="209" x2="282" y2="235"/>
  </g>
  <circle cx="318" cy="222" r="7" fill="#4A148C"/>

  <!-- Tricycle frame -->
  <line x1="150" y1="228" x2="195" y2="168" stroke="#9C27B0" stroke-width="7"/>
  <line x1="195" y1="168" x2="318" y2="222" stroke="#9C27B0" stroke-width="6"/>
  <line x1="195" y1="168" x2="220" y2="166" stroke="#9C27B0" stroke-width="6"/>
  <line x1="220" y1="166" x2="150" y2="228" stroke="#9C27B0" stroke-width="5"/>
  <!-- Rear carrier/rack connecting to axle -->
  <line x1="220" y1="166" x2="200" y2="195" stroke="#9C27B0" stroke-width="5"/>
  <line x1="200" y1="195" x2="200" y2="228" stroke="#9C27B0" stroke-width="5"/>

  <!-- Upright handlebars -->
  <line x1="195" y1="168" x2="195" y2="142" stroke="#333" stroke-width="5"/>
  <line x1="173" y1="138" x2="217" y2="138" stroke="#333" stroke-width="5"/>
  <circle cx="173" cy="138" r="5" fill="#111"/>
  <circle cx="217" cy="138" r="5" fill="#111"/>

  <!-- Saddle -->
  <line x1="220" y1="166" x2="220" y2="146" stroke="#333" stroke-width="4"/>
  <ellipse cx="220" cy="144" rx="18" ry="7" fill="#4A148C"/>

  <!-- GREAT EGRET -->
  <!-- Pure white body -->
  <ellipse cx="218" cy="125" rx="35" ry="20" fill="white" stroke="#E8EAF6" stroke-width="1"/>
  <!-- Breeding plumes (ornate feathers) -->
  <path d="M188,135 Q180,148 175,158 Q185,150 182,162 Q190,152 186,164" fill="white" stroke="#E8EAF6" stroke-width="1"/>
  <path d="M200,138 Q196,155 192,168" stroke="white" stroke-width="3" fill="none"/>
  <!-- Wing -->
  <ellipse cx="208" cy="132" rx="28" ry="12" fill="#FAFAFA"/>
  <!-- Long neck -->
  <path d="M238,110 Q260,92 262,72 Q264,56 256,46" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="256" cy="42" r="14" fill="white"/>
  <!-- Yellow bill -->
  <line x1="268" y1="44" x2="296" y2="50" stroke="#F9A825" stroke-width="6" stroke-linecap="round"/>
  <!-- Lore (yellow-green area near eye) -->
  <ellipse cx="268" cy="41" rx="5" ry="3" fill="#C6FF00" opacity="0.8"/>
  <!-- Eye -->
  <circle cx="266" cy="39" r="2.5" fill="#FDD835"/>
  <circle cx="266" cy="39" r="1.5" fill="#111"/>
  <!-- Black legs -->
  <line x1="210" y1="142" x2="205" y2="172" stroke="#1A1A1A" stroke-width="4"/>
  <line x1="226" y1="143" x2="230" y2="173" stroke="#1A1A1A" stroke-width="4"/>
  <!-- Yellow feet -->
  <path d="M198,172 L210,172 L203,176" fill="#F9A825"/>
  <path d="M224,173 L236,173 L229,177" fill="#F9A825"/>

  <text x="8" y="292" font-family="Georgia,serif" font-size="13" fill="#4A148C" font-style="italic">Great Egret · Tricycle</text>
</svg>
