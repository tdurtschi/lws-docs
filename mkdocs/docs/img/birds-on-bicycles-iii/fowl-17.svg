<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Atlantic Puffin on Track Bike</title>
  <rect width="400" height="300" fill="#F0A5A5"/>
  <rect y="255" width="400" height="45" fill="#8B3A3A"/>
  <path d="M 0 255 L 400 255 M 40 265 L 100 268 M 150 262 L 220 265 M 260 268 L 340 265" stroke="#5a2020" stroke-width="1"/>
  <!-- Track bike: aggressive geometry, no brakes, drops -->
  <circle cx="100" cy="220" r="36" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="300" cy="220" r="36" fill="none" stroke="#111" stroke-width="3"/>
  <g stroke="#111" stroke-width="0.8">
    <line x1="100" y1="184" x2="100" y2="256"/>
    <line x1="64" y1="220" x2="136" y2="220"/>
    <line x1="75" y1="195" x2="125" y2="245"/>
    <line x1="125" y1="195" x2="75" y2="245"/>
    <line x1="300" y1="184" x2="300" y2="256"/>
    <line x1="264" y1="220" x2="336" y2="220"/>
    <line x1="275" y1="195" x2="325" y2="245"/>
    <line x1="325" y1="195" x2="275" y2="245"/>
  </g>
  <path d="M 100 220 L 210 155 L 300 220 L 200 220 Z" stroke="#f5c451" stroke-width="5" fill="none"/>
  <line x1="100" y1="220" x2="135" y2="145" stroke="#f5c451" stroke-width="5"/>
  <path d="M 135 145 Q 120 145 118 155 Q 122 165 135 168" stroke="#111" stroke-width="3" fill="none"/>
  <path d="M 135 145 Q 150 145 152 155 Q 148 165 135 168" stroke="#111" stroke-width="3" fill="none"/>
  <rect x="200" y="147" width="18" height="6" fill="#111" rx="1"/>
  <!-- Atlantic Puffin: black back, white belly, colorful beak -->
  <ellipse cx="210" cy="130" rx="38" ry="22" fill="#0a0a0a"/>
  <ellipse cx="205" cy="140" rx="28" ry="15" fill="#fff"/>
  <circle cx="185" cy="108" r="19" fill="#0a0a0a"/>
  <!-- White face -->
  <ellipse cx="180" cy="108" rx="12" ry="10" fill="#e8e0d5"/>
  <!-- Iconic multicolor beak -->
  <path d="M 170 108 L 148 105 L 148 118 L 170 115 Z" fill="#f5c451"/>
  <path d="M 148 105 L 138 108 L 148 118 Z" fill="#c0392b"/>
  <path d="M 158 108 L 158 115" stroke="#0a0a0a" stroke-width="1"/>
  <path d="M 152 110 L 152 114" stroke="#0a0a0a" stroke-width="0.8"/>
  <!-- Eye with triangle marking -->
  <circle cx="182" cy="106" r="2.4" fill="#000"/>
  <path d="M 178 100 L 187 106 L 178 112 Z" fill="#c0392b" opacity="0.4"/>
  <!-- Orange feet -->
  <line x1="210" y1="152" x2="205" y2="215" stroke="#f39c12" stroke-width="4"/>
</svg>
