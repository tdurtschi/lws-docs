<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Grebe on Tricycle</title>
  <rect width="400" height="300" fill="#F9E2C8"/>
  <rect y="255" width="400" height="45" fill="#8b7a4a"/>
  <!-- Tricycle: three wheels -->
  <circle cx="90" cy="225" r="28" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="290" cy="225" r="24" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="340" cy="225" r="24" fill="none" stroke="#111" stroke-width="3"/>
  <g stroke="#111" stroke-width="1">
    <line x1="90" y1="197" x2="90" y2="253"/>
    <line x1="62" y1="225" x2="118" y2="225"/>
    <line x1="290" y1="201" x2="290" y2="249"/>
    <line x1="266" y1="225" x2="314" y2="225"/>
    <line x1="340" y1="201" x2="340" y2="249"/>
    <line x1="316" y1="225" x2="364" y2="225"/>
  </g>
  <!-- Rear axle connecting two rear wheels -->
  <line x1="290" y1="225" x2="340" y2="225" stroke="#333" stroke-width="4"/>
  <path d="M 90 225 L 200 170 L 315 225" stroke="#e67e22" stroke-width="6" fill="none"/>
  <line x1="200" y1="170" x2="200" y2="220" stroke="#e67e22" stroke-width="6"/>
  <line x1="90" y1="225" x2="130" y2="150" stroke="#e67e22" stroke-width="6"/>
  <path d="M 130 150 L 105 140 M 130 150 L 155 140" stroke="#111" stroke-width="4"/>
  <rect x="192" y="162" width="18" height="7" fill="#111" rx="1"/>
  <!-- Grebe: rufous neck, dark crown, tufted -->
  <ellipse cx="195" cy="140" rx="38" ry="20" fill="#8b6c50"/>
  <ellipse cx="175" cy="140" rx="18" ry="12" fill="#5a4030"/>
  <path d="M 165 132 Q 155 118 158 100 Q 165 88 175 88 Q 172 100 170 115 Q 168 128 175 138 Z" fill="#a0522d"/>
  <circle cx="167" cy="90" r="14" fill="#3a2820"/>
  <!-- Ear tufts -->
  <path d="M 160 82 L 155 68 L 162 78 Z" fill="#f5c451"/>
  <path d="M 175 82 L 178 68 L 180 78 Z" fill="#f5c451"/>
  <polygon points="153,92 138,92 153,98" fill="#333"/>
  <circle cx="163" cy="88" r="2.5" fill="#c0392b"/>
  <circle cx="163" cy="88" r="1.1" fill="#000"/>
  <line x1="195" y1="160" x2="200" y2="220" stroke="#333" stroke-width="3"/>
</svg>
