<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Cormorant on Fixed-Gear (Fixie)</title>
  <rect width="400" height="300" fill="#2c3e50"/>
  <circle cx="330" cy="60" r="30" fill="#f5f5f5" opacity="0.6"/>
  <rect y="255" width="400" height="45" fill="#1a252f"/>
  <!-- Fixed-gear bike: minimal, no brakes visible, colorful frame -->
  <circle cx="105" cy="220" r="36" fill="none" stroke="#f5f5f5" stroke-width="3"/>
  <circle cx="295" cy="220" r="36" fill="none" stroke="#f5f5f5" stroke-width="3"/>
  <g stroke="#f5f5f5" stroke-width="0.8">
    <line x1="105" y1="184" x2="105" y2="256"/>
    <line x1="69" y1="220" x2="141" y2="220"/>
    <line x1="80" y1="196" x2="130" y2="244"/>
    <line x1="130" y1="196" x2="80" y2="244"/>
    <line x1="295" y1="184" x2="295" y2="256"/>
    <line x1="259" y1="220" x2="331" y2="220"/>
  </g>
  <path d="M 105 220 L 200 165 L 295 220 L 200 220 Z" stroke="#e91e63" stroke-width="6" fill="none"/>
  <line x1="105" y1="220" x2="145" y2="145" stroke="#e91e63" stroke-width="6"/>
  <!-- Bullhorn bars -->
  <path d="M 145 145 L 125 140 L 120 130" stroke="#f5f5f5" stroke-width="4" fill="none"/>
  <path d="M 145 145 L 165 140 L 170 130" stroke="#f5f5f5" stroke-width="4" fill="none"/>
