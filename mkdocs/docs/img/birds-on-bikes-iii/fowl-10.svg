  <circle cx="245" cy="88" r="12" fill="#0f1a26"/>
  <polygon points="255,88 285,86 258,94" fill="#f5c451"/>
  <path d="M 275 86 L 285 86 L 280 90 Z" fill="#d4a020"/>
  <circle cx="248" cy="85" r="2" fill="#00c853"/>
  <path d="M 172 132 L 155 128 L 172 138 Z" fill="#3a4a5a"/>
