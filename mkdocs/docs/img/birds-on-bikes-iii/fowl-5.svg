<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Pelican on Cargo Bike</title>
  <rect width="400" height="300" fill="#F4C88C"/>
  <rect y="255" width="400" height="45" fill="#D8A461"/>
  <!-- Cargo bike: long front with cargo box -->
  <circle cx="70" cy="225" r="28" fill="none" stroke="#222" stroke-width="4"/>
  <circle cx="330" cy="225" r="34" fill="none" stroke="#222" stroke-width="4"/>
  <g stroke="#222" stroke-width="1">
    <line x1="70" y1="197" x2="70" y2="253"/>
    <line x1="42" y1="225" x2="98" y2="225"/>
    <line x1="330" y1="191" x2="330" y2="259"/>
    <line x1="296" y1="225" x2="364" y2="225"/>
  </g>
  <!-- Cargo box -->
  <rect x="80" y="150" width="130" height="75" fill="#a35c2a" stroke="#5c2f14" stroke-width="3" rx="4"/>
  <line x1="80" y1="170" x2="210" y2="170" stroke="#5c2f14" stroke-width="1"/>
  <path d="M 210 190 L 330 225 M 210 225 L 330 190" stroke="#2c7d5b" stroke-width="6" fill="none"/>
  <line x1="330" y1="225" x2="290" y2="150" stroke="#2c7d5b" stroke-width="6"/>
  <path d="M 290 150 L 270 138 M 290 150 L 310 138" stroke="#222" stroke-width="4"/>
  <rect x="240" y="165" width="20" height="7" fill="#111" rx="1"/>
  <!-- Pelican in cargo box -->
  <ellipse cx="145" cy="150" rx="60" ry="35" fill="#e8e0d0"/>
  <ellipse cx="120" cy="145" rx="24" ry="16" fill="#c7bfa7"/>
  <circle cx="180" cy="115" r="20" fill="#e8e0d0"/>
  <path d="M 180 128 Q 220 135 250 155 Q 245 165 210 158 Q 200 155 195 145" fill="#f0b429" stroke="#c68820" stroke-width="1.5"/>
  <path d="M 195 118 L 260 122 L 210 132" fill="#f0b429" stroke="#c68820" stroke-width="1.5"/>
  <path d="M 210 130 Q 240 145 250 155" fill="#f5c451" stroke="#c68820" stroke-width="1"/>
  <circle cx="186" cy="110" r="2.5" fill="#000"/>
  <path d="M 100 125 Q 90 115 78 118" stroke="#c7bfa7" stroke-width="3" fill="none"/>
</svg>
