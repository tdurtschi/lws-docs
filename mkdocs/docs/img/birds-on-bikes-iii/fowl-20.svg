<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Green-winged Teal on Beach Cruiser</title>
  <rect width="400" height="300" fill="#7FC4E0"/>
  <path d="M 0 210 Q 100 205 200 210 Q 300 215 400 210 L 400 260 L 0 260 Z" fill="#F5DEB3"/>
  <rect y="260" width="400" height="40" fill="#E5CFA0"/>
  <!-- Beach cruiser: swept-back bars, wide seat, curvy frame -->
  <circle cx="95" cy="220" r="38" fill="none" stroke="#111" stroke-width="4"/>
  <circle cx="95" cy="220" r="34" fill="#fff" fill-opacity="0.1"/>
  <circle cx="305" cy="220" r="38" fill="none" stroke="#111" stroke-width="4"/>
  <circle cx="305" cy="220" r="34" fill="#fff" fill-opacity="0.1"/>
  <g stroke="#111" stroke-width="1">
    <line x1="95" y1="182" x2="95" y2="258"/>
    <line x1="57" y1="220" x2="133" y2="220"/>
    <line x1="305" y1="182" x2="305" y2="258"/>
    <line x1="267" y1="220" x2="343" y2="220"/>
  </g>
  <!-- Curvy cruiser frame -->
  <path d="M 95 220 Q 140 165 190 175 Q 240 165 305 220" stroke="#e91e63" stroke-width="7" fill="none"/>
  <path d="M 305 220 Q 260 200 220 175" stroke="#e91e63" stroke-width="7" fill="none"/>
  <path d="M 95 220 Q 130 195 145 165" stroke="#e91e63" stroke-width="7" fill="none"/>
  <!-- Swept-back handlebars -->
  <path d="M 145 165 Q 130 158 115 165 M 145 165 Q 160 158 175 165" stroke="#111" stroke-width="4" fill="none"/>
  <path d="M 115 165 L 108 172 M 175 165 L 182 172" stroke="#f5f5f5" stroke-width="4"/>
  <!-- Wide seat -->
  <ellipse cx="230" cy="170" rx="22" ry="8" fill="#5a2f14"/>
  <path d="M 210 170 Q 210 178 220 178 L 240 178 Q 250 178 250 170" fill="#3a1e0a"/>
  <!-- Basket -->
  <rect x="140" y="145" width="30" height="22" fill="none" stroke="#c8965a" stroke-width="2"/>
  <path d="M 140 148 L 170 148 M 140 155 L 170 155 M 140 162 L 170 162 M 145 145 L 145 167 M 155 145 L 155 167 M 165 145 L 165 167" stroke="#c8965a" stroke-width="1"/>
  <!-- Green-winged Teal: small duck, chestnut head, green eye stripe -->
  <ellipse cx="215" cy="145" rx="36" ry="18" fill="#a89078"/>
  <ellipse cx="195" cy="145" rx="16" ry="10" fill="#7a6250"/>
  <!-- Green speculum wing patch -->
  <ellipse cx="220" cy="140" rx="14" ry="6" fill="#2c8c5a"/>
  <ellipse cx="220" cy="140" rx="10" ry="3" fill="#fff"/>
  <circle cx="192" cy="122" r="17" fill="#8b3a15"/>
  <!-- Green eye stripe -->
  <path d="M 192 118 Q 200 112 210 118 Q 208 128 200 130 Q 192 128 190 122 Z" fill="#1a5a3a"/>
  <path d="M 192 118 Q 200 115 210 120" stroke="#f5c451" stroke-width="0.8" fill="none"/>
  <polygon points="176,124 158,126 176,130" fill="#333"/>
  <circle cx="196" cy="122" r="1.8" fill="#000"/>
  <line x1="215" y1="163" x2="205" y2="215" stroke="#555" stroke-width="3"/>
  <!-- Sun -->
  <circle cx="350" cy="55" r="24" fill="#F9D648"/>
  <g stroke="#F9D648" stroke-width="2">
    <line x1="350" y1="20" x2="350" y2="10"/>
    <line x1="310" y1="55" x2="300" y2="55"/>
    <line x1="322" y1="27" x2="315" y2="20"/>
  </g>
</svg>
