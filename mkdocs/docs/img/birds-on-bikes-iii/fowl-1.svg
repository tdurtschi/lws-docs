<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Mallard on Penny-farthing</title>
  <rect width="400" height="300" fill="#B8E0F5"/>
  <rect y="255" width="400" height="45" fill="#8FCB6E"/>
  <!-- Penny-farthing: giant front wheel, tiny rear -->
  <circle cx="140" cy="180" r="70" fill="none" stroke="#2b2b2b" stroke-width="4"/>
  <circle cx="140" cy="180" r="5" fill="#2b2b2b"/>
  <g stroke="#2b2b2b" stroke-width="1.2">
    <line x1="140" y1="110" x2="140" y2="250"/>
    <line x1="70" y1="180" x2="210" y2="180"/>
    <line x1="90" y1="130" x2="190" y2="230"/>
    <line x1="190" y1="130" x2="90" y2="230"/>
  </g>
  <circle cx="310" cy="240" r="22" fill="none" stroke="#2b2b2b" stroke-width="3"/>
  <circle cx="310" cy="240" r="3" fill="#2b2b2b"/>
  <line x1="140" y1="180" x2="310" y2="240" stroke="#2b2b2b" stroke-width="3"/>
  <line x1="140" y1="110" x2="120" y2="90" stroke="#2b2b2b" stroke-width="3"/>
  <line x1="120" y1="90" x2="100" y2="80" stroke="#2b2b2b" stroke-width="3"/>
  <line x1="120" y1="90" x2="145" y2="85" stroke="#2b2b2b" stroke-width="3"/>
  <rect x="130" y="105" width="24" height="6" fill="#5a3a1e" rx="2"/>
  <!-- Mallard -->
  <ellipse cx="150" cy="80" rx="34" ry="20" fill="#8a7048"/>
  <ellipse cx="128" cy="80" rx="16" ry="10" fill="#4b3822"/>
  <circle cx="178" cy="60" r="18" fill="#1f7a3a"/>
  <path d="M 178 45 Q 190 40 195 48 Q 188 52 178 52 Z" fill="#1a6631"/>
  <polygon points="195,60 216,58 195,66" fill="#f0b429"/>
  <circle cx="184" cy="55" r="2.2" fill="#111"/>
  <path d="M 172 72 Q 178 78 185 72" stroke="#fff" stroke-width="2" fill="none"/>
  <line x1="150" y1="98" x2="140" y2="180" stroke="#f0b429" stroke-width="3"/>
</svg>
