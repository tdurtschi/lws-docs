<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="cargosky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="400" height="265" fill="url(#cargosky)"/>
  <!-- Market scene -->
  <rect y="252" width="400" height="48" fill="#546E7A"/>
  <rect y="249" width="400" height="6" fill="#455A64"/>
  <!-- Awning -->
  <path d="M0,100 L60,80 L60,110 Z" fill="#F44336"/>
  <rect x="0" y="100" width="60" height="5" fill="#B71C1C"/>

  <!-- Cargo Bike (front cargo box) -->
  <!-- Rear wheel -->
  <circle cx="295" cy="222" r="40" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="295" cy="222" r="32" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="295" y1="182" x2="295" y2="262"/>
    <line x1="255" y1="222" x2="335" y2="222"/>
    <line x1="267" y1="194" x2="323" y2="250"/>
    <line x1="323" y1="194" x2="267" y2="250"/>
    <line x1="257" y1="208" x2="333" y2="236"/>
    <line x1="333" y1="208" x2="257" y2="236"/>
  </g>
  <circle cx="295" cy="222" r="8" fill="#1A1A1A"/>

  <!-- Front wheel (smaller for cargo) -->
  <circle cx="100" cy="228" r="35" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="100" cy="228" r="27" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="100" y1="193" x2="100" y2="263"/>
    <line x1="65" y1="228" x2="135" y2="228"/>
    <line x1="75" y1="203" x2="125" y2="253"/>
    <line x1="125" y1="203" x2="75" y2="253"/>
    <line x1="66" y1="215" x2="134" y2="241"/>
    <line x1="134" y1="215" x2="66" y2="241"/>
  </g>
  <circle cx="100" cy="228" r="7" fill="#1A1A1A"/>

  <!-- Long cargo frame -->
  <line x1="295" y1="222" x2="250" y2="165" stroke="#2E7D32" stroke-width="7"/>
  <line x1="250" y1="165" x2="245" y2="165" stroke="#2E7D32" stroke-width="6"/>
  <!-- Long top tube to cargo box -->
  <line x1="245" y1="165" x2="155" y2="168" stroke="#2E7D32" stroke-width="6"/>
  <!-- Chain stays -->
  <line x1="250" y1="165" x2="295" y2="222" stroke="#2E7D32" stroke-width="5"/>
  <line x1="250" y1="165" x2="240" y2="222" stroke="#2E7D32" stroke-width="5"/>
  <line x1="240" y1="222" x2="295" y2="222" stroke="#2E7D32" stroke-width="4"/>

  <!-- Cargo box structure -->
  <rect x="100" y="168" width="155" height="55" rx="5" fill="#8D6E63" stroke="#5D4037" stroke-width="3"/>
  <rect x="103" y="171" width="149" height="49" rx="3" fill="#A1887F"/>
  <!-- Box contents (decorative) -->
  <ellipse cx="135" cy="190" rx="15" ry="10" fill="#F44336" opacity="0.8"/>
  <ellipse cx="165" cy="188" rx="12" ry="12" fill="#4CAF50" opacity="0.8"/>
  <ellipse cx="193" cy="191" rx="13" ry="9" fill="#FFC107" opacity="0.8"/>
  <ellipse cx="220" cy="189" rx="10" ry="11" fill="#FF7043" opacity="0.8"/>
  <!-- Fork to front wheel from cargo -->
  <line x1="155" y1="168" x2="100" y2="228" stroke="#2E7D32" stroke-width="5"/>

  <!-- Handlebars (upright cargo style) -->
  <line x1="245" y1="165" x2="245" y2="138" stroke="#333" stroke-width="5"/>
  <line x1="224" y1="134" x2="266" y2="134" stroke="#333" stroke-width="5"/>
  <circle cx="224" cy="134" r="5" fill="#111"/>
  <circle cx="266" cy="134" r="5" fill="#111"/>

  <!-- Saddle -->
  <line x1="250" y1="165" x2="255" y2="145" stroke="#333" stroke-width="4"/>
  <ellipse cx="255" cy="143" rx="17" ry="7" fill="#212121"/>

  <!-- NORTHERN PINTAIL -->
  <!-- Body (elegant, slim) -->
  <ellipse cx="252" cy="124" rx="38" ry="19" fill="#C8B8A0" transform="rotate(-7 252 124)"/>
  <!-- Wing -->
  <ellipse cx="243" cy="130" rx="32" ry="13" fill="#A0907A" transform="rotate(-5 243 130)"/>
  <!-- Chocolate-brown head -->
  <circle cx="280" cy="108" r="19" fill="#5D3A1A"/>
  <!-- White neck stripe going down -->
  <path d="M276,124 Q270,132 268,140" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Bill (narrow, blue-grey) -->
  <path d="M294,110 L313,112 L294,116" fill="#607D8B"/>
  <!-- Eye -->
  <circle cx="289" cy="106" r="2.5" fill="#1A1A1A"/>
  <circle cx="290" cy="105" r="1" fill="white"/>
  <!-- Long elegant pintail (key feature!) -->
  <path d="M218,117 Q200,108 188,96 Q180,88 182,80" stroke="#424242" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M218,118 Q202,110 192,102" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="247" y1="140" x2="243" y2="162" stroke="#607D8B" stroke-width="3"/>
  <line x1="261" y1="141" x2="265" y2="163" stroke="#607D8B" stroke-width="3"/>
  <path d="M236,162 L248,162 L241,166" fill="#607D8B"/>
  <path d="M260,163 L272,163 L265,167" fill="#607D8B"/>

  <text x="8" y="292" font-family="Georgia,serif" font-size="13" fill="#1B5E20" font-style="italic">Northern Pintail · Cargo Bike</text>
</svg>
