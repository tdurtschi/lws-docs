<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Cargo Bike Grebe -->
  <defs>
    <style>
      .bird { fill: #3a3a2a; stroke: #2a2a1a; stroke-width: 2; }
      .eye { fill: #000; }
      .bike { stroke: #4a4a3a; stroke-width: 3; fill: none; }
      .metal { fill: #666; stroke: #444; stroke-width: 1; }
      .cargo { fill: #8b7355; stroke: #654321; stroke-width: 2; }
    </style>
  </defs>

  <!-- Ground -->
  <rect y="250" width="400" height="50" fill="#8b8b7a"/>

  <!-- Back wheel -->
  <circle cx="310" cy="200" r="42" class="bike"/>
  <circle cx="310" cy="200" r="3" class="metal"/>

  <!-- Front wheel (smaller) -->
  <circle cx="110" cy="200" r="32" class="bike"/>
  <circle cx="110" cy="200" r="3" class="metal"/>

  <!-- Cargo box (front) -->
  <rect x="70" y="100" width="80" height="70" class="cargo" rx="5"/>

  <!-- Cargo box handle -->
  <path d="M 80 100 Q 110 70 140 100" class="cargo" fill="none" stroke="#654321" stroke-width="3"/>

  <!-- Frame -->
  <line x1="110" y1="140" x2="310" y2="200" class="bike" stroke-width="3"/>
  <line x1="110" y1="140" x2="75" y2="200" class="bike"/>
  <line x1="310" y1="200" x2="75" y2="200" class="bike"/>

  <!-- Handlebars -->
  <line x1="110" y1="140" x2="110" y2="115" class="bike"/>
  <line x1="95" y1="110" x2="125" y2="110" class="bike" stroke-width="2"/>

  <!-- Seat -->
  <ellipse cx="200" cy="130" rx="14" ry="10" class="metal"/>

  <!-- Grebe body -->
  <ellipse cx="215" cy="110" rx="35" ry="38" class="bird"/>

  <!-- Grebe head -->
  <circle cx="232" cy="72" r="13" class="bird"/>

  <!-- Grebe eye -->
  <circle cx="239" cy="70" r="2" class="eye"/>

  <!-- Grebe pointed beak -->
  <polygon points="248,72 268,70 248,74" fill="#999"/>

  <!-- Pedals -->
  <circle cx="160" cy="155" r="5" class="metal"/>
  <circle cx="210" cy="155" r="5" class="metal"/>
</svg>