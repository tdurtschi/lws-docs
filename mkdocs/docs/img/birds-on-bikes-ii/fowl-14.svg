<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Gravel Bike Wigeon -->
  <defs>
    <style>
      .bird { fill: #6a5a3a; stroke: #4a3a1a; stroke-width: 2; }
      .eye { fill: #000; }
      .bike { stroke: #8b6f47; stroke-width: 2; fill: none; }
      .metal { fill: #a0826d; stroke: #6f5f4f; stroke-width: 1; }
    </style>
  </defs>

  <!-- Ground (gravel texture) -->
  <rect y="250" width="400" height="50" fill="#9a8a7a"/>
  <circle cx="50" cy="270" r="2" fill="#7a6a5a"/>
  <circle cx="120" cy="280" r="2" fill="#7a6a5a"/>
  <circle cx="200" cy="275" r="2" fill="#7a6a5a"/>
  <circle cx="300" cy="285" r="2" fill="#7a6a5a"/>

  <!-- Back wheel (knobby for gravel) -->
  <circle cx="310" cy="200" r="42" class="bike"/>
  <circle cx="310" cy="200" r="48" class="bike" opacity="0.2"/>
  <circle cx="310" cy="200" r="3" class="metal"/>

  <!-- Front wheel -->
  <circle cx="120" cy="200" r="42" class="bike"/>
  <circle cx="120" cy="200" r="48" class="bike" opacity="0.2"/>
  <circle cx="120" cy="200" r="3" class="metal"/>

  <!-- Gravel frame (endurance geometry) -->
  <line x1="120" y1="135" x2="310" y2="200" class="bike"/>
  <line x1="120" y1="135" x2="80" y2="200" class="bike"/>
  <line x1="310" y1="200" x2="80" y2="200" class="bike"/>

  <!-- Drop bars -->
  <line x1="120" y1="135" x2="120" y2="110" class="bike"/>
  <path d="M 110 105 Q 120 95 130 105" class="bike" stroke-width="2"/>

  <!-- Endurance seat -->
  <ellipse cx="200" cy="125" rx="16" ry="10" class="metal"/>

  <!-- Wigeon body -->
  <ellipse cx="200" cy="105" rx="33" ry="36" class="bird"/>

  <!-- Wigeon head -->
  <circle cx="218" cy="68" r="14" class="bird"/>

  <!-- Wigeon eye -->
  <circle cx="225" cy="66" r="2" class="eye"/>

  <!-- Wigeon distinctive crown -->
  <path d="M 218 55 L 220 45 L 216 50 Q 215 48 214 50" fill="#6a5a3a" opacity="0.8"/>

  <!-- Wigeon beak -->
  <polygon points="232,68 252,66 232,70" fill="#999"/>

  <!-- Pedals -->
  <circle cx="160" cy="160" r="5" class="metal"/>
  <circle cx="240" cy="160" r="5" class="metal"/>
</svg>