<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tandemsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
  </defs>
  <rect width="400" height="265" fill="url(#tandemsky)"/>
  <!-- Ocean horizon hint -->
  <rect y="220" width="400" height="35" fill="#4FC3F7" opacity="0.4"/>
  <rect y="253" width="400" height="47" fill="#757575"/>
  <rect y="250" width="400" height="6" fill="#616161"/>
  <!-- Dashed center line -->
  <rect x="10" y="261" width="50" height="3" fill="#FFEB3B" rx="1"/>
  <rect x="90" y="261" width="50" height="3" fill="#FFEB3B" rx="1"/>
  <rect x="170" y="261" width="50" height="3" fill="#FFEB3B" rx="1"/>
  <rect x="250" y="261" width="50" height="3" fill="#FFEB3B" rx="1"/>
  <rect x="330" y="261" width="50" height="3" fill="#FFEB3B" rx="1"/>

  <!-- Tandem Bike (long wheelbase) -->
  <!-- Rear wheel -->
  <circle cx="95" cy="222" r="40" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="95" cy="222" r="33" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#444" stroke-width="2">
    <line x1="95" y1="182" x2="95" y2="262"/>
    <line x1="55" y1="222" x2="135" y2="222"/>
    <line x1="67" y1="194" x2="123" y2="250"/>
    <line x1="123" y1="194" x2="67" y2="250"/>
    <line x1="57" y1="208" x2="133" y2="236"/>
    <line x1="133" y1="208" x2="57" y2="236"/>
  </g>
  <circle cx="95" cy="222" r="7" fill="#1A1A1A"/>

  <!-- Front wheel -->
  <circle cx="315" cy="222" r="40" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="315" cy="222" r="33" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#444" stroke-width="2">
    <line x1="315" y1="182" x2="315" y2="262"/>
    <line x1="275" y1="222" x2="355" y2="222"/>
    <line x1="287" y1="194" x2="343" y2="250"/>
    <line x1="343" y1="194" x2="287" y2="250"/>
    <line x1="277" y1="208" x2="353" y2="236"/>
    <line x1="353" y1="208" x2="277" y2="236"/>
  </g>
  <circle cx="315" cy="222" r="7" fill="#1A1A1A"/>

  <!-- Tandem frame (long) -->
  <line x1="95" y1="222" x2="145" y2="165" stroke="#FF9800" stroke-width="6"/>
  <line x1="145" y1="165" x2="195" y2="165" stroke="#FF9800" stroke-width="6"/>
  <line x1="195" y1="165" x2="260" y2="165" stroke="#FF9800" stroke-width="6"/>
  <line x1="260" y1="165" x2="315" y2="222" stroke="#FF9800" stroke-width="6"/>
  <line x1="145" y1="165" x2="95" y2="222" stroke="#FF9800" stroke-width="5"/>
  <line x1="260" y1="165" x2="200" y2="222" stroke="#FF9800" stroke-width="5"/>
  <line x1="200" y1="222" x2="95" y2="222" stroke="#FF9800" stroke-width="4"/>
  <!-- Chain stays -->
  <line x1="200" y1="222" x2="260" y2="165" stroke="#FF9800" stroke-width="4"/>
  <line x1="200" y1="222" x2="315" y2="222" stroke="#FF9800" stroke-width="4"/>

  <!-- Rear seat (captain) -->
  <line x1="145" y1="165" x2="145" y2="145" stroke="#333" stroke-width="4"/>
  <ellipse cx="145" cy="143" rx="16" ry="6" fill="#212121"/>
  <!-- Front seat (stoker) -->
  <line x1="260" y1="165" x2="260" y2="145" stroke="#333" stroke-width="4"/>
  <ellipse cx="260" cy="143" rx="16" ry="6" fill="#212121"/>

  <!-- Handlebars (front) -->
  <line x1="315" y1="165" x2="315" y2="142" stroke="#333" stroke-width="4"/>
  <line x1="298" y1="138" x2="332" y2="138" stroke="#333" stroke-width="4"/>
  <circle cx="298" cy="138" r="4" fill="#111"/>
  <circle cx="332" cy="138" r="4" fill="#111"/>

  <!-- PELICAN (front seat) -->
  <!-- Large white body -->
  <ellipse cx="258" cy="125" rx="38" ry="22" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Black wing tips -->
  <path d="M232,130 Q224,138 218,132" fill="#212121"/>
  <path d="M284,130 Q292,138 298,132" fill="#212121"/>
  <!-- Neck -->
  <path d="M270,108 Q282,95 284,80" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="285" cy="73" r="16" fill="white"/>
  <!-- Large bill with pouch -->
  <path d="M296,76 L325,82 L318,96 L296,90 Z" fill="#FF8F00"/>
  <path d="M297,85 Q310,90 318,96" stroke="#E65100" stroke-width="2" fill="none"/>
  <!-- Gular pouch -->
  <path d="M296,90 Q312,100 318,96" fill="#FF6F00" opacity="0.7"/>
  <!-- Eye -->
  <circle cx="295" cy="71" r="3" fill="#FDD835"/>
  <circle cx="295" cy="71" r="2" fill="#1A1A1A"/>
  <!-- Crest feather -->
  <path d="M283,60 Q280,50 278,45" stroke="#FFC107" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M223,122 Q208,116 205,124 Q213,130 210,137" fill="#BDBDBD"/>
  <!-- Feet -->
  <line x1="252" y1="145" x2="248" y2="170" stroke="#FF8F00" stroke-width="3"/>
  <line x1="266" y1="147" x2="270" y2="172" stroke="#FF8F00" stroke-width="3"/>
  <line x1="242" y1="169" x2="256" y2="169" stroke="#FF8F00" stroke-width="3"/>
  <line x1="265" y1="171" x2="279" y2="171" stroke="#FF8F00" stroke-width="3"/>

  <!-- Small seagull in back seat as stoker -->
  <ellipse cx="144" cy="128" rx="22" ry="13" fill="white"/>
  <circle cx="158" cy="118" r="11" fill="white"/>
  <path d="M165,120 L178,122 L165,125" fill="#FF8F00"/>
  <circle cx="163" cy="117" r="2" fill="#1A1A1A"/>
  <line x1="140" y1="140" x2="137" y2="163" stroke="#FF8F00" stroke-width="2"/>
  <line x1="150" y1="141" x2="153" y2="164" stroke="#FF8F00" stroke-width="2"/>

  <text x="8" y="292" font-family="Georgia,serif" font-size="13" fill="#E65100" font-style="italic">Pelican · Tandem Bicycle</text>
</svg>
