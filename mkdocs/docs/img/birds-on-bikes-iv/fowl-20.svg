<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340">
  <title>Common eider on a tall bike</title>
  <line x1="20" y1="302" x2="380" y2="302" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round"/>
  <!-- wheels -->
  <g stroke="#37474f" fill="none">
    <circle cx="110" cy="260" r="42" stroke-width="6"/>
    <circle cx="290" cy="260" r="42" stroke-width="6"/>
    <g stroke-width="1.5">
      <path d="M110 218v84M68 260h84M80 230l60 60M80 290l60-60"/>
      <path d="M290 218v84M248 260h84M260 230l60 60M260 290l60-60"/>
    </g>
  </g>
  <!-- double-stacked frames -->
  <g stroke="#f4511e" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M196 262L170 196"/>
    <path d="M196 262L258 196"/>
    <path d="M172 200L258 196"/>
    <path d="M170 199L110 260"/>
    <path d="M196 262L110 260"/>
    <path d="M262 191L290 260"/>
    <!-- second frame welded on top -->
    <path d="M172 198L158 118"/>
    <path d="M258 194L252 118"/>
    <path d="M160 124L252 118"/>
    <path d="M186 160L244 156"/>
  </g>
  <!-- chain running way down -->
  <circle cx="196" cy="262" r="10" fill="none" stroke="#212121" stroke-width="4"/>
  <circle cx="196" cy="196" r="7" fill="none" stroke="#212121" stroke-width="3"/>
  <path d="M189 196 L186 262 M203 196 L206 262" stroke="#616161" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="196" y1="196" x2="212" y2="216" stroke="#212121" stroke-width="5" stroke-linecap="round"/>
  <path d="M204 217h16" stroke="#424242" stroke-width="6" stroke-linecap="round"/>
  <!-- saddle and bars up top -->
  <path d="M142 116h32" stroke="#212121" stroke-width="8" stroke-linecap="round"/>
  <path d="M252 118 L248 100 h-22" fill="none" stroke="#212121" stroke-width="5" stroke-linecap="round"/>
  <!-- common eider: white back, black flanks and cap, sloping bill -->
  <path d="M126 76 l-24 -10 5 12 -7 10 19 0z" fill="#fafafa"/>
  <ellipse cx="164" cy="86" rx="42" ry="26" fill="#fafafa" stroke="#e0e0e0" stroke-width="2"/>
  <path d="M128 92 C144 104 168 110 190 106 L190 92 C168 98 146 96 132 88 Z" fill="#212121"/>
  <path d="M190 74 C206 68 218 60 226 48" stroke="#fafafa" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- wedge head with long sloping profile -->
  <path d="M216 36 C228 28 244 30 252 40 L246 52 C236 56 224 54 216 48 Z" fill="#fafafa"/>
  <path d="M216 34 C224 28 236 28 244 32 L240 38 C232 34 224 34 218 38 Z" fill="#212121"/>
  <path d="M250 40 L272 48 L248 52 Z" fill="#9ccc65"/>
  <circle cx="240" cy="42" r="2.4" fill="#111"/>
  <path d="M152 76 C178 76 218 90 250 106 C218 106 182 102 156 96 Z" fill="#eceff1"/>
  <polyline points="178,108 192,160 210,214" fill="none" stroke="#455a64" stroke-width="6" stroke-linecap="round"/>
  <path d="M202 215h17" stroke="#455a64" stroke-width="5" stroke-linecap="round"/>
</svg>
