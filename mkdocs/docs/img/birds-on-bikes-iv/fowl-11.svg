  <path d="M266 148L270 130h17c11 0 13 17 2 19h-8" fill="none" stroke="#212121" stroke-width="5" stroke-linecap="round"/>
  <path d="M146 142h32" stroke="#212121" stroke-width="7" stroke-linecap="round"/>
  <circle cx="195" cy="222" r="11" fill="none" stroke="#37474f" stroke-width="4"/>
  <line x1="195" y1="222" x2="212" y2="245" stroke="#37474f" stroke-width="5" stroke-linecap="round"/>
  <path d="M204 246h18" stroke="#212121" stroke-width="6" stroke-linecap="round"/>
