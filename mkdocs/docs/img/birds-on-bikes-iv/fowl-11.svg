  <path d="M160 102 C186 102 226 118 258 136 C226 134 190 128 164 122 Z" fill="#90a4ae"/>
  <polyline points="184,134 197,192 212,243" fill="none" stroke="#546e7a" stroke-width="6" stroke-linecap="round"/>
  <path d="M204 244h17" stroke="#546e7a" stroke-width="5" stroke-linecap="round"/>
