  <g stroke="#5e35b1" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M195 222L162 144"/>
    <path d="M195 222L266 148"/>
    <path d="M165 150L266 148"/>
    <path d="M162 147L105 220"/>
    <path d="M195 222L105 220"/>
    <path d="M270 143L295 220"/>
  </g>
  <path d="M172 154 L252 152 L196 214 Z" fill="#455a64"/>
  <path d="M186 168 h8" stroke="#90a4ae" stroke-width="2"/>
