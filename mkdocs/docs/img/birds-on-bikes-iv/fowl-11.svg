  <g fill="#bdbdbd">
    <circle cx="40" cy="264" r="2.5"/><circle cx="70" cy="266" r="2"/><circle cx="110" cy="264" r="2.5"/>
    <circle cx="160" cy="266" r="2"/><circle cx="210" cy="264" r="2.5"/><circle cx="260" cy="266" r="2"/>
    <circle cx="310" cy="264" r="2.5"/><circle cx="350" cy="266" r="2"/>
  </g>
  <!-- wide-tire wheels -->
  <g fill="none">
    <circle cx="105" cy="220" r="42" stroke="#3e2723" stroke-width="8" stroke-dasharray="7 3"/>
    <circle cx="295" cy="220" r="42" stroke="#3e2723" stroke-width="8" stroke-dasharray="7 3"/>
    <g stroke="#616161" stroke-width="1.5">
