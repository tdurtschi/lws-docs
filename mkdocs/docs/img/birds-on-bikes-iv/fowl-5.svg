<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Common loon on a mountain bike</title>
  <line x1="20" y1="262" x2="380" y2="262" stroke="#795548" stroke-width="3" stroke-linecap="round" stroke-dasharray="14 8"/>
  <!-- knobby wheels -->
