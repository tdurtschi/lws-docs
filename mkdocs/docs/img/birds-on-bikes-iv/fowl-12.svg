  <polyline points="196,196 130,206 56,222" fill="none" stroke="#ef6c00" stroke-width="6" stroke-linecap="round"/>
  <path d="M50 224 l14 3" stroke="#ef6c00" stroke-width="5" stroke-linecap="round"/>
</svg>
