  <line x1="46" y1="208" x2="58" y2="224" stroke="#212121" stroke-width="4" stroke-linecap="round"/>
  <path d="M28 191h14M52 225h14" stroke="#424242" stroke-width="5" stroke-linecap="round"/>
  <!-- high bars -->
  <path d="M150 226 L142 172 h-20" fill="none" stroke="#212121" stroke-width="5" stroke-linecap="round"/>
  <!-- goldeneye lounging back -->
  <path d="M280 176 l22 -20 -4 16 10 8 -20 6z" fill="#212121"/>
  <ellipse cx="228" cy="184" rx="44" ry="26" transform="rotate(-14 228 184)" fill="#fafafa" stroke="#e0e0e0" stroke-width="2"/>
  <path d="M232 162 C226 176 216 188 204 194 L242 194 C242 182 238 170 236 162 Z" fill="#212121"/>
  <path d="M196 176 C178 170 164 160 156 146" stroke="#1b3b1b" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="152" cy="138" r="16" fill="#1b3b1b"/>
  <circle cx="160" cy="146" r="4.5" fill="#fafafa"/>
  <path d="M138 140 L120 146 L139 149 Z" fill="#212121"/>
  <circle cx="147" cy="134" r="2.6" fill="#ffd600"/>
  <circle cx="147" cy="134" r="1.2" fill="#111"/>
