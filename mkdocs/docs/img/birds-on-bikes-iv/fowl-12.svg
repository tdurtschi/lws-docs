<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Common goldeneye on a recumbent</title>
  <line x1="20" y1="262" x2="380" y2="262" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round"/>
  <!-- small front wheel, larger rear -->
  <g stroke="#37474f" fill="none">
    <circle cx="320" cy="222" r="40" stroke-width="6"/>
    <circle cx="80" cy="234" r="28" stroke-width="6"/>
    <g stroke-width="1.5">
      <path d="M320 182v80M280 222h80M292 194l56 56M292 250l56-56"/>
      <path d="M80 206v56M52 234h56"/>
    </g>
  </g>
  <!-- long low boom frame -->
  <path d="M80 234 L150 226 L250 218 L320 222" fill="none" stroke="#ef6c00" stroke-width="9" stroke-linecap="round"/>
  <!-- reclined seat with backrest -->
  <path d="M200 218 L240 214 L262 168" fill="none" stroke="#37474f" stroke-width="9" stroke-linecap="round"/>
  <!-- boom crank out front -->
  <path d="M80 234 L48 210" stroke="#ef6c00" stroke-width="7" stroke-linecap="round"/>
  <circle cx="46" cy="208" r="9" fill="none" stroke="#212121" stroke-width="4"/>
