  <path d="M295 140L292 122h-20" fill="none" stroke="#37474f" stroke-width="5" stroke-linecap="round"/>
  <!-- cygnet (rear seat, front of image? no—stoker sits at rear saddle x=165) -->
  <ellipse cx="162" cy="112" rx="28" ry="20" fill="#b0bec5"/>
  <path d="M138 104 l-18 -8 4 10 -6 8 14 2z" fill="#90a4ae"/>
