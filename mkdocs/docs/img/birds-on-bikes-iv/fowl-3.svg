  <path d="M262 100 l-22 -10 5 12 -7 10 17 1z" fill="#eceff1"/>
  <ellipse cx="298" cy="106" rx="40" ry="26" fill="#fafafa" stroke="#cfd8dc" stroke-width="2"/>
