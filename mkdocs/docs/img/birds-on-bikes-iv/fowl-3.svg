    <path d="M330 222L295 140"/>
    <path d="M168 146L298 146"/>
    <path d="M200 222L330 222"/>
    <path d="M330 222L408 148"/>
    <path d="M298 146L408 148"/>
    <path d="M165 143L95 220"/>
    <path d="M200 222L95 220"/>
    <path d="M412 143L435 220"/>
