<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="urbansky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#ECEFF1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="265" fill="url(#urbansky)"/>
  <!-- City buildings silhouette -->
  <rect x="10" y="170" width="40" height="85" fill="#B0BEC5" opacity="0.6"/>
  <rect x="55" y="150" width="30" height="105" fill="#90A4AE" opacity="0.6"/>
  <rect x="90" y="180" width="25" height="75" fill="#B0BEC5" opacity="0.6"/>
  <rect x="310" y="160" width="35" height="95" fill="#90A4AE" opacity="0.6"/>
  <rect x="350" y="175" width="40" height="80" fill="#B0BEC5" opacity="0.6"/>
  <!-- Street -->
  <rect y="252" width="400" height="48" fill="#424242"/>
  <rect y="249" width="400" height="6" fill="#616161"/>
  <!-- Painted bike lane -->
  <rect y="255" width="400" height="20" fill="#388E3C" opacity="0.3"/>
  <!-- Dashed -->
  <rect x="5" y="263" width="40" height="3" fill="white" opacity="0.5" rx="1"/>
  <rect x="60" y="263" width="40" height="3" fill="white" opacity="0.5" rx="1"/>
  <rect x="115" y="263" width="40" height="3" fill="white" opacity="0.5" rx="1"/>
  <rect x="170" y="263" width="40" height="3" fill="white" opacity="0.5" rx="1"/>
  <rect x="225" y="263" width="40" height="3" fill="white" opacity="0.5" rx="1"/>
  <rect x="280" y="263" width="40" height="3" fill="white" opacity="0.5" rx="1"/>
  <rect x="335" y="263" width="40" height="3" fill="white" opacity="0.5" rx="1"/>

  <!-- Fixie Bike (minimal, clean) -->
  <!-- Rear wheel -->
  <circle cx="148" cy="220" r="40" fill="none" stroke="#111" stroke-width="5"/>
  <circle cx="148" cy="220" r="34" fill="none" stroke="#333" stroke-width="1"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="148" y1="180" x2="148" y2="260"/>
    <line x1="108" y1="220" x2="188" y2="220"/>
    <line x1="120" y1="192" x2="176" y2="248"/>
    <line x1="176" y1="192" x2="120" y2="248"/>
    <line x1="110" y1="206" x2="186" y2="234"/>
    <line x1="186" y1="206" x2="110" y2="234"/>
    <line x1="134" y1="181" x2="162" y2="259"/>
    <line x1="162" y1="181" x2="134" y2="259"/>
  </g>
  <circle cx="148" cy="220" r="7" fill="#111"/>

  <!-- Front wheel -->
  <circle cx="285" cy="220" r="40" fill="none" stroke="#111" stroke-width="5"/>
  <circle cx="285" cy="220" r="34" fill="none" stroke="#333" stroke-width="1"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="285" y1="180" x2="285" y2="260"/>
    <line x1="245" y1="220" x2="325" y2="220"/>
    <line x1="257" y1="192" x2="313" y2="248"/>
    <line x1="313" y1="192" x2="257" y2="248"/>
    <line x1="247" y1="206" x2="323" y2="234"/>
    <line x1="323" y1="206" x2="247" y2="234"/>
    <line x1="271" y1="181" x2="299" y2="259"/>
    <line x1="299" y1="181" x2="271" y2="259"/>
  </g>
  <circle cx="285" cy="220" r="7" fill="#111"/>

  <!-- Fixie frame (simple diamond, track geometry) -->
  <line x1="148" y1="220" x2="200" y2="160" stroke="#37474F" stroke-width="6"/>
  <line x1="200" y1="160" x2="285" y2="220" stroke="#37474F" stroke-width="6"/>
  <line x1="200" y1="160" x2="228" y2="158" stroke="#37474F" stroke-width="6"/>
  <line x1="228" y1="158" x2="148" y2="220" stroke="#37474F" stroke-width="5"/>
  <!-- Chain (straight single) -->
  <line x1="200" y1="195" x2="148" y2="220" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Track drops handlebars -->
  <line x1="200" y1="160" x2="200" y2="138" stroke="#333" stroke-width="4"/>
  <path d="M183,135 Q200,128 217,135 Q218,144 210,148 Q203,152 198,146" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="198" cy="146" r="4" fill="#111"/>
  <circle cx="183" cy="135" r="4" fill="#111"/>

  <!-- Saddle (thin racing style) -->
  <line x1="228" y1="158" x2="228" y2="138" stroke="#333" stroke-width="4"/>
  <path d="M214,137 Q228,131 242,137" stroke="#111" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Pedal/crank -->
  <circle cx="200" cy="195" r="9" fill="#333"/>
  <line x1="192" y1="205" x2="208" y2="185" stroke="#555" stroke-width="4"/>
  <rect x="185" y="203" width="14" height="4" fill="#222" rx="1"/>

  <!-- TEAL DUCK (Green-winged Teal) -->
  <!-- Body -->
  <ellipse cx="222" cy="120" rx="35" ry="21" fill="#795548" transform="rotate(-8 222 120)"/>
  <!-- Wing patch (teal/green) -->
  <ellipse cx="215" cy="126" rx="28" ry="12" fill="#00695C" transform="rotate(-5 215 126)"/>
  <!-- Wing highlight -->
  <ellipse cx="215" cy="124" rx="24" ry="8" fill="#00897B" transform="rotate(-5 215 124)"/>
  <!-- White stripe -->
  <path d="M202,118 Q215,115 228,118" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Head (chestnut with teal stripe) -->
  <circle cx="252" cy="103" r="20" fill="#6D4C41"/>
  <!-- Teal eye stripe -->
  <path d="M244,100 Q252,96 262,100" stroke="#004D40" stroke-width="5" fill="none"/>
  <!-- Beak -->
  <path d="M267,106 L282,108 L267,111" fill="#444"/>
  <!-- Eye -->
  <circle cx="261" cy="101" r="2.5" fill="#FFF9C4"/>
  <circle cx="261" cy="101" r="1.5" fill="#111"/>
  <!-- Tail -->
  <path d="M190,114 Q175,108 170,116 Q178,123 174,130" fill="#5D4037"/>
  <!-- Feet -->
  <line x1="217" y1="138" x2="213" y2="162" stroke="#FF8F00" stroke-width="3"/>
  <line x1="230" y1="140" x2="234" y2="163" stroke="#FF8F00" stroke-width="3"/>
  <line x1="207" y1="161" x2="220" y2="161" stroke="#FF8F00" stroke-width="3"/>
  <line x1="229" y1="162" x2="242" y2="162" stroke="#FF8F00" stroke-width="3"/>

  <text x="8" y="292" font-family="Georgia,serif" font-size="13" fill="#212121" font-style="italic">Green-winged Teal · Fixie</text>
</svg>
