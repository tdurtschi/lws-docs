<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>King Eider on Bamboo Bike</title>
  <rect width="400" height="300" fill="#B8D4E3"/>
  <rect y="255" width="400" height="45" fill="#D6D3C3"/>
  <!-- Bamboo bike: wooden-textured frame -->
  <circle cx="105" cy="220" r="35" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="295" cy="220" r="35" fill="none" stroke="#111" stroke-width="3"/>
  <g stroke="#111" stroke-width="1">
    <line x1="105" y1="185" x2="105" y2="255"/>
    <line x1="70" y1="220" x2="140" y2="220"/>
    <line x1="295" y1="185" x2="295" y2="255"/>
    <line x1="260" y1="220" x2="330" y2="220"/>
  </g>
  <!-- Bamboo tubes -->
  <g stroke="#8b6f2a" stroke-width="9" stroke-linecap="round">
    <line x1="105" y1="220" x2="200" y2="165"/>
    <line x1="200" y1="165" x2="295" y2="220"/>
    <line x1="200" y1="165" x2="200" y2="220"/>
    <line x1="105" y1="220" x2="200" y2="220"/>
    <line x1="105" y1="220" x2="140" y2="145"/>
  </g>
  <!-- Bamboo joints (nodes) -->
  <g stroke="#5a4515" stroke-width="1.5">
    <line x1="130" y1="207" x2="145" y2="204"/>
    <line x1="160" y1="192" x2="175" y2="188"/>
    <line x1="225" y1="180" x2="240" y2="188"/>
    <line x1="260" y1="200" x2="275" y2="208"/>
    <line x1="200" y1="185" x2="200" y2="188"/>
    <line x1="200" y1="200" x2="200" y2="203"/>
    <line x1="118" y1="195" x2="132" y2="192"/>
  </g>
  <!-- Lashings at joints -->
  <ellipse cx="200" cy="165" rx="10" ry="4" fill="#8b3a15" opacity="0.7"/>
  <ellipse cx="140" cy="145" rx="7" ry="3" fill="#8b3a15" opacity="0.7"/>
  <path d="M 140 145 L 122 132 M 140 145 L 158 132" stroke="#111" stroke-width="4"/>
  <rect x="192" y="157" width="18" height="6" fill="#111" rx="1"/>
  <!-- King Eider: multi-colored head with orange knob -->
  <ellipse cx="210" cy="135" rx="42" ry="22" fill="#fff"/>
  <ellipse cx="215" cy="150" rx="30" ry="10" fill="#0a0a0a"/>
  <circle cx="180" cy="112" r="20" fill="#e0e4f0"/>
  <!-- Green cheek -->
  <ellipse cx="175" cy="118" rx="8" ry="6" fill="#7db56a"/>
  <!-- Blue crown -->
  <path d="M 172 100 Q 180 92 190 100 Q 185 108 175 108 Z" fill="#8fa8c9"/>
  <!-- Orange frontal knob -->
  <path d="M 168 108 Q 155 105 152 115 Q 160 118 172 116 Z" fill="#f39c12"/>
  <path d="M 168 108 Q 158 100 152 108" stroke="#e67e22" stroke-width="2" fill="none"/>
  <!-- Red beak -->
  <polygon points="150,116 138,118 150,122" fill="#c0392b"/>
  <path d="M 138 118 L 148 118" stroke="#8b1a0f" stroke-width="1"/>
  <circle cx="180" cy="108" r="1.8" fill="#000"/>
  <line x1="210" y1="157" x2="205" y2="215" stroke="#f39c12" stroke-width="3"/>
</svg>
