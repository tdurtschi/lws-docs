<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Common Loon on Cyclocross Bike</title>
  <rect width="400" height="300" fill="#B5CFD8"/>
  <rect y="250" width="400" height="50" fill="#7d6a4a"/>
  <path d="M 0 245 L 400 250 M 20 260 L 60 258 M 100 262 L 150 260 M 200 258 L 260 262 M 300 260 L 360 258" stroke="#5a4a30" stroke-width="1.5"/>
  <!-- Cyclocross bike: skinny knobby tires, drop bars -->
  <circle cx="105" cy="215" r="35" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="105" cy="215" r="30" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3 2"/>
  <circle cx="295" cy="215" r="35" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="295" cy="215" r="30" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3 2"/>
  <g stroke="#111" stroke-width="1">
    <line x1="105" y1="180" x2="105" y2="250"/>
    <line x1="70" y1="215" x2="140" y2="215"/>
    <line x1="295" y1="180" x2="295" y2="250"/>
    <line x1="260" y1="215" x2="330" y2="215"/>
  </g>
  <path d="M 105 215 L 205 158 L 295 215 L 200 215 Z" stroke="#556b2f" stroke-width="5" fill="none"/>
  <line x1="105" y1="215" x2="145" y2="140" stroke="#556b2f" stroke-width="5"/>
  <path d="M 145 140 Q 130 132 128 145 Q 132 155 145 158" stroke="#111" stroke-width="3" fill="none"/>
  <path d="M 145 140 Q 160 132 162 145 Q 158 155 145 158" stroke="#111" stroke-width="3" fill="none"/>
  <rect x="197" y="150" width="18" height="6" fill="#111" rx="1"/>
  <!-- Common Loon: black with white necklace -->
  <ellipse cx="210" cy="135" rx="42" ry="22" fill="#0a0a0a"/>
  <path d="M 170 128 Q 178 122 190 130 M 180 138 Q 190 132 200 140 M 172 148 Q 182 142 192 148" stroke="#fff" stroke-width="1.5"/>
  <path d="M 220 128 Q 228 122 240 130 M 230 138 Q 240 132 245 138" stroke="#fff" stroke-width="1.5"/>
  <ellipse cx="195" cy="140" rx="12" ry="6" fill="#333"/>
  <circle cx="180" cy="110" r="18" fill="#0a0a0a"/>
  <!-- White necklace stripes -->
  <path d="M 168 122 L 175 128 M 178 125 L 182 130 M 188 122 L 192 128" stroke="#fff" stroke-width="2"/>
  <path d="M 172 132 Q 180 138 190 130" stroke="#fff" stroke-width="3" fill="none"/>
  <polygon points="164,108 145,105 164,112" fill="#0a0a0a"/>
  <circle cx="178" cy="105" r="2.4" fill="#c0392b"/>
  <circle cx="178" cy="105" r="1.1" fill="#000"/>
  <line x1="210" y1="157" x2="200" y2="210" stroke="#333" stroke-width="3"/>
