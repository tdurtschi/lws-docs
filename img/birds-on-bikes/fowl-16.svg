<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="dutchsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="400" height="265" fill="url(#dutchsky)"/>
  <!-- Amsterdam canal scene -->
  <rect y="230" width="400" height="25" fill="#90CAF9" opacity="0.6"/>
  <!-- Brick buildings -->
  <rect x="5" y="100" width="55" height="130" fill="#BF360C" opacity="0.6"/>
  <rect x="12" y="110" width="15" height="20" fill="#90CAF9" opacity="0.8"/>
  <rect x="35" y="110" width="15" height="20" fill="#90CAF9" opacity="0.8"/>
  <!-- Gabled roof -->
  <polygon points="5,100 32,70 60,100" fill="#8D2400" opacity="0.6"/>
  <rect x="340" y="110" width="55" height="120" fill="#BF360C" opacity="0.6"/>
  <rect x="347" y="120" width="15" height="20" fill="#90CAF9" opacity="0.8"/>
  <rect x="368" y="120" width="15" height="20" fill="#90CAF9" opacity="0.8"/>
  <polygon points="340,110 367,80 395,110" fill="#8D2400" opacity="0.6"/>
  <!-- Street (brick) -->
  <rect y="252" width="400" height="48" fill="#BF360C" opacity="0.7"/>
  <rect y="249" width="400" height="6" fill="#8D2400" opacity="0.7"/>
  <!-- Brick pattern -->
  <g fill="#8D2400" opacity="0.3">
    <rect x="0" y="253" width="30" height="10"/>
    <rect x="35" y="253" width="30" height="10"/>
    <rect x="70" y="253" width="30" height="10"/>
    <rect x="15" y="263" width="30" height="10"/>
    <rect x="50" y="263" width="30" height="10"/>
  </g>

  <!-- Dutch City Bike (upright, fenders, chain guard) -->
  <!-- Rear wheel -->
  <circle cx="148" cy="222" r="42" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="148" cy="222" r="35" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="148" y1="180" x2="148" y2="264"/>
    <line x1="106" y1="222" x2="190" y2="222"/>
    <line x1="119" y1="192" x2="177" y2="252"/>
    <line x1="177" y1="192" x2="119" y2="252"/>
    <line x1="108" y1="207" x2="188" y2="237"/>
    <line x1="188" y1="207" x2="108" y2="237"/>
    <line x1="133" y1="181" x2="163" y2="263"/>
    <line x1="163" y1="181" x2="133" y2="263"/>
  </g>
  <circle cx="148" cy="222" r="8" fill="#1A1A1A"/>
  <!-- Rear fender -->
  <path d="M108,195 Q125,170 148,180 Q171,170 188,195" stroke="#1A1A1A" stroke-width="5" fill="none"/>

  <!-- Front wheel -->
  <circle cx="290" cy="222" r="42" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="290" cy="222" r="35" fill="none" stroke="#333" stroke-width="1.5"/>
  <g stroke="#444" stroke-width="1.5">
    <line x1="290" y1="180" x2="290" y2="264"/>
    <line x1="248" y1="222" x2="332" y2="222"/>
    <line x1="261" y1="192" x2="319" y2="252"/>
    <line x1="319" y1="192" x2="261" y2="252"/>
    <line x1="250" y1="207" x2="330" y2="237"/>
    <line x1="330" y1="207" x2="250" y2="237"/>
    <line x1="275" y1="181" x2="305" y2="263"/>
    <line x1="305" y1="181" x2="275" y2="263"/>
  </g>
  <circle cx="290" cy="222" r="8" fill="#1A1A1A"/>
  <!-- Front fender -->
  <path d="M250,195 Q267,170 290,180 Q313,170 330,195" stroke="#1A1A1A" stroke-width="5" fill="none"/>

  <!-- Dutch frame (step-through style, upright) -->
  <line x1="148" y1="222" x2="200" y2="162" stroke="#1565C0" stroke-width="7"/>
  <line x1="200" y1="162" x2="290" y2="222" stroke="#1565C0" stroke-width="7"/>
  <line x1="200" y1="162" x2="228" y2="160" stroke="#1565C0" stroke-width="7"/>
  <line x1="228" y1="160" x2="148" y2="222" stroke="#1565C0" stroke-width="6"/>
  <!-- Chain guard (full arc) -->
  <path d="M148,200 Q158,178 170,172 Q182,165 195,168 Q205,170 200,180 Q198,190 190,195 Q172,205 148,200 Z" fill="#1565C0" stroke="#0D47A1" stroke-width="2" opacity="0.8"/>
  <!-- Rear rack -->
  <rect x="125" y="172" width="45" height="8" rx="2" fill="#333"/>
  <line x1="130" y1="172" x2="125" y2="195" stroke="#333" stroke-width="3"/>
  <line x1="165" y1="172" x2="168" y2="195" stroke="#333" stroke-width="3"/>

  <!-- Upright handlebars (swept back Dutch style) -->
  <line x1="200" y1="162" x2="200" y2="135" stroke="#333" stroke-width="5"/>
  <path d="M176,132 Q200,125 224,132 Q226,140 218,146 Q208,150 202,144" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="176" cy="132" r="5" fill="#111"/>
  <circle cx="202" cy="144" r="5" fill="#111"/>

  <!-- Saddle (upright comfort) -->
  <line x1="228" y1="160" x2="228" y2="138" stroke="#333" stroke-width="4"/>
  <ellipse cx="228" cy="137" rx="22" ry="9" fill="#5D4037"/>
  <ellipse cx="228" cy="135" rx="20" ry="7" fill="#795548"/>

  <!-- NORTHERN SHOVELER -->
  <!-- Body (white chest, chestnut sides) -->
  <ellipse cx="222" cy="118" rx="40" ry="22" fill="white" transform="rotate(-7 222 118)"/>
  <!-- Chestnut flanks -->
  <ellipse cx="215" cy="126" rx="35" ry="14" fill="#8D3B1B" transform="rotate(-5 215 126)"/>
  <!-- Green back -->
  <ellipse cx="205" cy="120" rx="28" ry="11" fill="#1B5E20" transform="rotate(-5 205 120)"/>
  <!-- White chest remains visible -->
  <ellipse cx="235" cy="113" rx="18" ry="16" fill="white" transform="rotate(15 235 113)"/>
  <!-- Green iridescent head -->
  <circle cx="258" cy="100" r="21" fill="#2E7D32"/>
  <!-- Head sheen -->
  <ellipse cx="254" cy="97" rx="14" ry="10" fill="#1B5E20" opacity="0.5"/>
  <!-- Eye (golden) -->
  <circle cx="268" cy="95" r="3.5" fill="#FDD835"/>
  <circle cx="268" cy="95" r="2" fill="#1A1A1A"/>
  <circle cx="269" cy="94" r="1" fill="white"/>
  <!-- MASSIVE spatulate bill (the defining feature!) -->
  <path d="M276,102 Q290,105 310,106 Q318,108 320,112 Q316,118 308,118 Q288,117 276,113 Z" fill="#FF8F00"/>
  <!-- Bill nostril -->
  <ellipse cx="295" cy="108" rx="5" ry="2.5" fill="#E65100" opacity="0.6"/>
  <!-- Tail (blue feathers) -->
  <path d="M185,112 Q170,106 167,115 Q175,121 172,129 Q182,122 180,130" fill="#1565C0"/>
  <!-- Feet (orange) -->
  <line x1="217" y1="137" x2="212" y2="158" stroke="#FF8F00" stroke-width="3"/>
  <line x1="231" y1="138" x2="235" y2="159" stroke="#FF8F00" stroke-width="3"/>
  <path d="M206,158 L218,158 L211,162" fill="#FF8F00"/>
  <path d="M230,159 L242,159 L235,163" fill="#FF8F00"/>

  <text x="8" y="292" font-family="Georgia,serif" font-size="13" fill="#0D47A1" font-style="italic">Northern Shoveler · Dutch City Bike</text>
</svg>
