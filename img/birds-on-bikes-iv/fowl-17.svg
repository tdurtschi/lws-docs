<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Harlequin duck on a trials bike, front wheel up on a rock</title>
  <line x1="20" y1="272" x2="380" y2="272" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round"/>
  <!-- boulder under front wheel -->
  <path d="M270 272 C268 240 300 232 322 244 C336 252 336 268 330 272 Z" fill="#78909c"/>
  <!-- wheels: front perched on rock -->
  <g stroke="#212121" fill="none">
    <circle cx="115" cy="234" r="38" stroke-width="8" stroke-dasharray="5 4"/>
    <circle cx="296" cy="208" r="38" stroke-width="8" stroke-dasharray="5 4"/>
    <g stroke="#546e7a" stroke-width="1.5">
      <path d="M115 196v76M77 234h76"/>
      <path d="M296 170v76M258 208h76"/>
    </g>
  </g>
  <!-- low trials frame, no real saddle -->
  <g stroke="#ff1744" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M198 230 L184 190"/>
    <path d="M198 230 L258 162"/>
    <path d="M186 194 L260 164"/>
    <path d="M184 193 L115 234"/>
    <path d="M198 230 L115 234"/>
    <path d="M262 158 L296 208"/>
  </g>
  <!-- bash guard -->
  <circle cx="198" cy="230" r="14" fill="none" stroke="#9e9e9e" stroke-width="5"/>
  <!-- wide riser bars -->
  <path d="M260 162 L252 132 h-26" fill="none" stroke="#212121" stroke-width="5" stroke-linecap="round"/>
  <!-- cranks level, rider standing -->
  <line x1="198" y1="230" x2="176" y2="232" stroke="#212121" stroke-width="5" stroke-linecap="round"/>
  <line x1="198" y1="230" x2="220" y2="228" stroke="#212121" stroke-width="5" stroke-linecap="round"/>
  <path d="M168 233h16M212 229h16" stroke="#424242" stroke-width="6" stroke-linecap="round"/>
  <!-- harlequin duck standing on pedals -->
  <path d="M148 140 l-22 -8 5 10 -7 10 18 -2z" fill="#37474f"/>
  <ellipse cx="184" cy="146" rx="38" ry="24" fill="#455a64"/>
  <path d="M158 138 l0 16 M170 132 l0 22" stroke="#fafafa" stroke-width="3" stroke-linecap="round"/>
  <path d="M150 152 C162 160 178 164 192 160 L190 148 C176 152 160 152 152 146 Z" fill="#8d4a3b"/>
  <path d="M206 134 C218 126 228 116 232 102" stroke="#455a64" stroke-width="11" fill="none" stroke-linecap="round"/>
  <circle cx="235" cy="94" r="14" fill="#455a64"/>
  <path d="M226 86 C230 82 236 82 240 84 L238 92 C234 90 230 90 227 92 Z" fill="#fafafa"/>
  <path d="M243 88 l4 12" stroke="#8d4a3b" stroke-width="3" stroke-linecap="round"/>
  <path d="M247 92 L262 98 L246 101 Z" fill="#546e7a"/>
  <circle cx="238" cy="92" r="2.2" fill="#111"/>
  <path d="M172 138 C196 138 228 150 252 164 C228 162 200 160 176 156 Z" fill="#37474f"/>
  <path d="M188 148 l16 4 -17 3z" fill="#fafafa"/>
  <polyline points="176,166 176,200 176,229" fill="none" stroke="#607d8b" stroke-width="6" stroke-linecap="round"/>
  <polyline points="198,166 210,196 218,225" fill="none" stroke="#607d8b" stroke-width="6" stroke-linecap="round"/>
  <path d="M169 230h15M211 226h15" stroke="#607d8b" stroke-width="5" stroke-linecap="round"/>
</svg>
