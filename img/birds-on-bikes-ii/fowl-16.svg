<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Artistic/Abstract Bike Scoter -->
  <defs>
    <style>
      .bird { fill: #1a1a2a; stroke: #000; stroke-width: 2; }
      .eye { fill: #ff00ff; }
      .bike { stroke: #ff1493; stroke-width: 2; fill: none; }
      .metal { fill: #ffb6c1; stroke: #ff69b4; stroke-width: 1; }
    </style>
  </defs>

  <!-- Ground (abstract) -->
  <rect y="250" width="400" height="50" fill="#2a2a3a"/>
  <polygon points="0,250 50,240 100,250 150,240 200,250 250,240 300,250 350,240 400,250" fill="#1a1a2a"/>

  <!-- Back wheel (spiral) -->
  <circle cx="300" cy="200" r="40" class="bike"/>
  <circle cx="300" cy="200" r="28" class="bike" opacity="0.5"/>
  <circle cx="300" cy="200" r="16" class="bike" opacity="0.3"/>
  <circle cx="300" cy="200" r="3" class="metal"/>

  <!-- Front wheel (spiral) -->
  <circle cx="130" cy="200" r="40" class="bike"/>
  <circle cx="130" cy="200" r="28" class="bike" opacity="0.5"/>
  <circle cx="130" cy="200" r="16" class="bike" opacity="0.3"/>
  <circle cx="130" cy="200" r="3" class="metal"/>

  <!-- Abstract frame (curved) -->
  <path d="M 130 140 Q 170 100 300 200" class="bike" stroke-width="3"/>
  <path d="M 130 140 Q 100 170 80 200" class="bike" stroke-width="2"/>
  <line x1="300" y1="200" x2="80" y2="200" class="bike" stroke-width="2"/>

  <!-- Artistic handlebars -->
  <path d="M 130 140 Q 130 100 120 75" class="bike" stroke-width="3"/>
  <circle cx="120" cy="70" r="8" class="bike" fill="none"/>

  <!-- Abstract seat -->
  <polygon points="190 130 210 130 205 145 185 145" class="metal"/>

  <!-- Scoter body (artistic) -->
  <path d="M 190 110 Q 200 85 220 80 Q 240 85 245 115 Q 235 140 190 135 Z" class="bird"/>

  <!-- Scoter head -->
  <ellipse cx="235" cy="65" rx="16" ry="18" class="bird"/>

  <!-- Scoter bright eye -->
  <circle cx="245" cy="62" r="3" class="eye"/>

  <!-- Abstract beak -->
  <path d="M 250 65 L 275 62 Q 280 65 275 68 L 250 65" class="metal" fill="#ff1493"/>

  <!-- Artistic pedals -->
  <circle cx="160" cy="160" r="7" class="metal"/>
  <circle cx="230" cy="160" r="7" class="metal"/>
</svg>