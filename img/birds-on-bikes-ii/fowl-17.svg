<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Retro Bike Phalarope -->
  <defs>
    <style>
      .bird { fill: #8a4a2a; stroke: #5a2a0a; stroke-width: 2; }
      .eye { fill: #000; }
      .bike { stroke: #c0a080; stroke-width: 2.5; fill: none; }
      .metal { fill: #d4a574; stroke: #8b7355; stroke-width: 1; }
    </style>
  </defs>

  <!-- Ground -->
  <rect y="250" width="400" height="50" fill="#c9a876"/>

  <!-- Back wheel (classic) -->
  <circle cx="310" cy="200" r="43" class="bike" stroke-width="2.5"/>
  <circle cx="310" cy="200" r="3" class="metal"/>

  <!-- Front wheel -->
  <circle cx="120" cy="200" r="43" class="bike" stroke-width="2.5"/>
  <circle cx="120" cy="200" r="3" class="metal"/>

  <!-- Retro frame (classic upright) -->
  <line x1="120" y1="130" x2="310" y2="200" class="bike" stroke-width="3"/>
  <line x1="120" y1="130" x2="80" y2="200" class="bike" stroke-width="2.5"/>
  <line x1="310" y1="200" x2="80" y2="200" class="bike" stroke-width="2.5"/>

  <!-- Curved handlebars (retro style) -->
  <line x1="120" y1="130" x2="120" y2="100" class="bike" stroke-width="2.5"/>
  <path d="M 105 95 Q 120 85 135 95" class="bike" stroke-width="2"/>

  <!-- Classic sprung seat -->
  <ellipse cx="200" cy="120" rx="18" ry="11" class="metal"/>

  <!-- Seat springs -->
  <line x1="185" y1="131" x2="180" y2="145" class="metal" stroke-width="2"/>
  <line x1="215" y1="131" x2="220" y2="145" class="metal" stroke-width="2"/>

  <!-- Phalarope body (small, delicate) -->
  <ellipse cx="200" cy="100" rx="30" ry="32" class="bird"/>

  <!-- Phalarope head -->
  <circle cx="215" cy="70" r="12" class="bird"/>

  <!-- Phalarope eye -->
  <circle cx="222" cy="68" r="2" class="eye"/>

  <!-- Phalarope needle beak -->
  <polygon points="228,70 250,68 228,72" fill="#ff8c00"/>

  <!-- Classic pedals (ornate) -->
  <circle cx="165" cy="155" r="6" class="metal"/>
  <circle cx="235" cy="155" r="6" class="metal"/>

  <!-- Pedal decorative detail -->
  <line x1="162" y1="155" x2="168" y2="155" class="metal" stroke-width="1" opacity="0.7"/>
  <line x1="232" y1="155" x2="238" y2="155" class="metal" stroke-width="1" opacity="0.7"/>
</svg>