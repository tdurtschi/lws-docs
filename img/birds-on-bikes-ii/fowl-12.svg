<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Hybrid Bike Moorhen -->
  <defs>
    <style>
      .bird { fill: #4a2a1a; stroke: #2a1a0a; stroke-width: 2; }
      .eye { fill: #ffff00; }
      .bike { stroke: #666; stroke-width: 2; fill: none; }
      .metal { fill: #888; stroke: #555; stroke-width: 1; }
    </style>
  </defs>

  <!-- Ground -->
  <rect y="250" width="400" height="50" fill="#7a8a7a"/>

  <!-- Back wheel -->
  <circle cx="310" cy="200" r="40" class="bike"/>
  <circle cx="310" cy="200" r="3" class="metal"/>

  <!-- Front wheel -->
  <circle cx="125" cy="200" r="40" class="bike"/>
  <circle cx="125" cy="200" r="3" class="metal"/>

  <!-- Hybrid frame (comfortable, versatile) -->
  <line x1="125" y1="135" x2="310" y2="200" class="bike"/>
  <line x1="125" y1="135" x2="85" y2="200" class="bike"/>
  <line x1="310" y1="200" x2="85" y2="200" class="bike"/>

  <!-- Handlebar (slightly raised) -->
  <line x1="125" y1="135" x2="125" y2="110" class="bike"/>
  <line x1="110" y1="105" x2="140" y2="105" class="bike" stroke-width="2"/>

  <!-- Comfortable seat -->
  <ellipse cx="200" cy="125" rx="16" ry="10" class="metal"/>

  <!-- Moorhen body (compact) -->
  <ellipse cx="200" cy="105" rx="32" ry="35" class="bird"/>

  <!-- Moorhen head -->
  <circle cx="215" cy="70" r="13" class="bird"/>

  <!-- Moorhen red eye -->
  <circle cx="222" cy="68" r="3" class="eye"/>

  <!-- Moorhen shield on head -->
  <ellipse cx="215" cy="65" rx="8" ry="5" fill="#ff0000" opacity="0.7"/>

  <!-- Moorhen beak -->
  <polygon points="228,70 248,68 228,72" fill="#ff6600"/>

  <!-- Pedals -->
  <circle cx="165" cy="160" r="5" class="metal"/>
  <circle cx="225" cy="160" r="5" class="metal"/>
</svg>