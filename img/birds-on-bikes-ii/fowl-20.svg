<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Electric E-Bike Wood Duck -->
  <defs>
    <style>
      .bird { fill: #8a5a3a; stroke: #5a3a1a; stroke-width: 2; }
      .eye { fill: #000; }
      .bike { stroke: #007bff; stroke-width: 2.5; fill: none; }
      .metal { fill: #00aaff; stroke: #0055aa; stroke-width: 1; }
      .battery { fill: #ff6600; stroke: #cc3300; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Ground -->
  <rect y="250" width="400" height="50" fill="#8a7a6a"/>

  <!-- Back wheel (motorized) -->
  <circle cx="310" cy="200" r="42" class="bike"/>
  <circle cx="310" cy="200" r="3" class="metal"/>

  <!-- Motor indicator on back wheel -->
  <circle cx="310" cy="200" r="35" class="bike" opacity="0.2" stroke-width="1"/>

  <!-- Front wheel -->
  <circle cx="120" cy="200" r="42" class="bike"/>
  <circle cx="120" cy="200" r="3" class="metal"/>

  <!-- E-bike frame -->
  <line x1="120" y1="130" x2="310" y2="200" class="bike" stroke-width="3"/>
  <line x1="120" y1="130" x2="80" y2="200" class="bike" stroke-width="2.5"/>
  <line x1="310" y1="200" x2="80" y2="200" class="bike" stroke-width="2.5"/>

  <!-- Battery pack (mounted on frame) -->
  <rect x="195" y="145" width="30" height="45" class="battery" rx="3"/>

  <!-- Battery indicator lights -->
  <circle cx="200" cy="152" r="2" fill="#00ff00"/>
  <circle cx="210" cy="152" r="2" fill="#00ff00"/>
  <circle cx="200" cy="162" r="2" fill="#00ff00"/>
  <circle cx="210" cy="162" r="2" fill="#ffff00" opacity="0.6"/>

  <!-- Handlebar with display -->
  <line x1="120" y1="130" x2="120" y2="105" class="bike"/>
  <rect x="110" y="95" width="20" height="12" fill="#00aaff" stroke="#0055aa" stroke-width="1" rx="2"/>

  <!-- Seat -->
  <ellipse cx="200" cy="120" rx="15" ry="9" class="metal"/>

  <!-- Wood duck body (ornate plumage) -->
  <ellipse cx="200" cy="100" rx="36" ry="38" class="bird"/>

  <!-- Wood duck head (crested) -->
  <path d="M 220 60 Q 230 40 228 20" stroke="#8a5a3a" stroke-width="10" fill="none"/>

  <!-- Wood duck head shape -->
  <circle cx="230" cy="18" r="14" class="bird"/>

  <!-- Wood duck face markings -->
  <path d="M 220 15 Q 235 10 240 20" stroke="#fff" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Wood duck eye -->
  <circle cx="238" cy="16" r="3" class="eye"/>

  <!-- Wood duck beak -->
  <polygon points="248,18 268,15 248,21" fill="#999"/>

  <!-- Motor indicator -->
  <circle cx="310" cy="200" r="5" fill="#ff6600" opacity="0.7"/>

  <!-- Electric pedals -->
  <circle cx="160" cy="160" r="5" class="metal"/>
  <circle cx="240" cy="160" r="5" class="metal"/>

  <!-- Power line to motor -->
  <line x1="225" y1="165" x2="290" y2="190" stroke="#ff6600" stroke-width="2" opacity="0.6"/>
</svg>